version: '3.8'

services:
  # AsimNexus Backend
  backend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ASIM_NODE_ID=asimnexus-node-1
      - ASIM_COUNTRY=NP
      - NEPAL_ONLY=true
    restart: unless-stopped

  # AsimNexus Frontend
  frontend:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  # Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: asimnexus
      POSTGRES_PASSWORD: asimnexus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Clickhouse (Analytics)
  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/init:/docker-entrypoint-initdb.d
    environment:
      CLICKHOUSE_DB: asimnexus
    restart: unless-stopped

  # MinIO (S3 Storage)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: asimnexus
      MINIO_ROOT_PASSWORD: asimnexus123
    restart: unless-stopped

volumes:
  postgres_data:
  clickhouse_data:
  minio_data: