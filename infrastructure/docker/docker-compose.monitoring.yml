# AsimNexus Monitoring Stack
# ============================
# Separate compose file for monitoring infrastructure (exporters, etc.)
# These are referenced by docker-compose.prod.yml's prometheus scrape configs.
#
# Usage:
#   docker compose -f infrastructure/docker/docker-compose.prod.yml -f infrastructure/docker/docker-compose.monitoring.yml up -d
#
# Or standalone for monitoring-only deployments:
#   docker compose -f infrastructure/docker/docker-compose.monitoring.yml up -d

services:
  # ── Node Exporter (host metrics) ──────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: asimnexus-node-exporter
    command:
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    network_mode: host
    restart: unless-stopped
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  # ── PostgreSQL Exporter ───────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: asimnexus-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://asimnexus:${POSTGRES_PASSWORD}@postgres:5432/asimnexus?sslmode=disable"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.2'

  # ── Redis Exporter ────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: asimnexus-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
