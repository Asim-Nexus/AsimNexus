spec:
  selector:
    app: nexus-identity
  ports:
  - port: 8087
    targetPort: 8087
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-hard-lock-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-hard-lock
  ports:
  - port: 8088
    targetPort: 8088
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-dashboard-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-dashboard
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-api-gateway-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-api-gateway
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-boot-hpa
  namespace: asimnexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-boot
  minReplicas: 10
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nexus-inference-hpa
  namespace: asimnexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nexus-inference
  minReplicas: 50
  maxReplicas: 1000
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: nvidia.com/gpu
      target:
        type: Utilization
        averageUtilization: 85

---
# Ingress Configuration
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexus-ingress
  namespace: asimnexus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - asimnexus.org
    - api.asimnexus.org
    - dashboard.asimnexus.org
    secretName: nexus-tls
  rules:
  - host: asimnexus.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-api-gateway-service
            port:
              number: 8000
  - host: dashboard.asimnexus.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nexus-dashboard-service
            port:
              number: 3000

