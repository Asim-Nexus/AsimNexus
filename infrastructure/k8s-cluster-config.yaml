---
# Secrets Configuration
apiVersion: v1
kind: Secret
metadata:
  name: nexus-secrets
  namespace: asimnexus
type: Opaque
data:
  postgres-password: <base64-encoded-password>
  redis-password: <base64-encoded-password>
  rabbitmq-password: <base64-encoded-password>
  grafana-password: <base64-encoded-password>
  jwt-secret: <base64-encoded-jwt-secret>
  encryption-key: <base64-encoded-encryption-key>

---
# Monitoring Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-monitoring-config
  namespace: asimnexus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    rule_files:
      - "/etc/prometheus/rules/*.yml"
    scrape_configs:
      - job_name: 'asimnexus'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
          replacement: $1
        - action: labelmap
          regex: __meta_kubernetes_namespace
          replacement: kubernetes_namespace
        - action: labelmap
          regex: __meta_kubernetes_pod_name
          replacement: kubernetes_pod_name

---
# Deployment Strategy
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-deployment-strategy
  namespace: asimnexus
data:
  strategy.yaml: |
    deployment:
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 25%
          maxSurge: 25%
      minReadySeconds: 10
      progressDeadlineSeconds: 600
    scaling:
      minReplicas: 10
      maxReplicas: 1000
      targetCPUUtilization: 70
      targetMemoryUtilization: 80
    health:
      livenessProbe:
        initialDelaySeconds: 30
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        initialDelaySeconds: 5
        periodSeconds: 5
        timeoutSeconds: 3
        failureThreshold: 3

