  name: nexus-kernel-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-kernel
  ports:
  - port: 8083
    targetPort: 8083
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-mesh-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-mesh
  ports:
  - port: 8084
    targetPort: 8084
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: nexus-inference-service
  namespace: asimnexus
spec:
  selector:
    app: nexus-inference
  ports:
  - port: 8086
    targetPort: 8086
  type: ClusterIP

---
apiVersion: v1
kind: Service
