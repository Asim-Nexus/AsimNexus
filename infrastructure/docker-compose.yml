# ASIMNEXUS Universal Living OS - Docker Compose Configuration
# ==============================================================
# Production-ready containerization for 1M+ users
# RTX 2060 GPU acceleration support
# Microservices architecture with auto-scaling

version: '3.8'

services:
  # Core Services
  nexus-boot:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.boot
    container_name: nexus-boot
    restart: unless-stopped
    privileged: true
    environment:
      - NEXUS_MODE=production
      - LOG_LEVEL=INFO
      - GPU_ENABLED=true
    volumes:
      - nexus_data:/app/data
      - nexus_logs:/app/logs
      - /dev:/dev
      - /sys:/sys
    networks:
      - nexus-network
    depends_on:
      - nexus-event-bus
      - nexus-resource-manager
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Event Bus Service
  nexus-event-bus:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.event-bus
    container_name: nexus-event-bus
    restart: unless-stopped
    environment:
      - EVENT_BUS_MODE=production
      - MAX_EVENTS=10000
      - PERSISTENT_STORAGE=true
    volumes:
      - nexus_events:/app/events
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Resource Manager Service
  nexus-resource-manager:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.resource-manager
    container_name: nexus-resource-manager
    restart: unless-stopped
    environment:
      - RESOURCE_MANAGER_MODE=production
      - GPU_ENABLED=true
      - AUTO_SCALING=true
    volumes:
      - nexus_resources:/app/resources
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8082:8082"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Sovereign Kernel Service
  nexus-kernel:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.kernel
    container_name: nexus-kernel
    restart: unless-stopped
    environment:
      - KERNEL_MODE=production
      - DHARMA_CHAKRA_ENABLED=true
      - CONSTITUTIONAL_COMPLIANCE=true
    volumes:
      - nexus_kernel:/app/kernel
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8083:8083"
    depends_on:
      - nexus-event-bus
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 6G
        reservations:
          cpus: '1.5'
          memory: 3G

  # Zero Latency Mesh Service
  nexus-mesh:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mesh
    container_name: nexus-mesh
    restart: unless-stopped
    environment:
      - MESH_MODE=production
      - ENCRYPTION_ENABLED=true
      - PEER_DISCOVERY=true
    volumes:
      - nexus_mesh:/app/mesh
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8084:8084"
      - "8085:8085/udp"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1.5G

  # Local Inference Service (RTX 2060 GPU)
  nexus-inference:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.inference
    container_name: nexus-inference
    restart: unless-stopped
    environment:
      - INFERENCE_MODE=production
      - GPU_ENABLED=true
      - MODEL_PATH=/app/models
      - QUANTIZATION=int4
    volumes:
      - nexus_models:/app/models
      - nexus_inference:/app/inference
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8086:8086"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # Identity Quantum Vault Service
  nexus-identity:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.identity
    container_name: nexus-identity
    restart: unless-stopped
    environment:
      - IDENTITY_MODE=production
      - QUANTUM_SECURITY=true
      - BIOMETRIC_ENCRYPTION=true
    volumes:
      - nexus_identity:/app/identity
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8087:8087"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Hardware Hard-Lock Service
  nexus-hard-lock:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.hard-lock
    container_name: nexus-hard-lock
    restart: unless-stopped
    privileged: true
    environment:
      - HARD_LOCK_MODE=production
      - GOVERNMENT_PROTECTION=true
      - HARDWARE_ISOLATION=true
    volumes:
      - nexus_security:/app/security
      - nexus_logs:/app/logs
      - /dev:/dev
      - /sys:/sys
    networks:
      - nexus-network
    ports:
      - "8088:8088"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Live Dashboard Service
  nexus-dashboard:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.dashboard
    container_name: nexus-dashboard
    restart: unless-stopped
    environment:
      - DASHBOARD_MODE=production
      - REAL_TIME_MONITORING=true
      - GPU_MONITORING=true
    volumes:
      - nexus_dashboard:/app/dashboard
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "3000:3000"
    depends_on:
      - nexus-resource-manager
      - nexus-event-bus
      - nexus-hard-lock
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # API Gateway Service
  nexus-api-gateway:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.api-gateway
    container_name: nexus-api-gateway
    restart: unless-stopped
    environment:
      - API_GATEWAY_MODE=production
      - RATE_LIMITING=true
      - AUTHENTICATION=true
    volumes:
      - nexus_api:/app/api
      - nexus_logs:/app/logs
    networks:
      - nexus-network
    ports:
      - "8000:8000"
    depends_on:
      - nexus-boot
      - nexus-kernel
      - nexus-inference
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 3G
        reservations:
          cpus: '1.0'
          memory: 1.5G

  # Database Services
  nexus-postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=asimnexus
      - POSTGRES_USER=nexus
      - POSTGRES_PASSWORD=${NEXUS_DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
      - nexus_postgres_config:/etc/postgresql
    networks:
      - nexus-network
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  nexus-redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${NEXUS_REDIS_PASSWORD}
    volumes:
      - nexus_redis_data:/data
      - nexus_redis_config:/usr/local/etc/redis
    networks:
      - nexus-network
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Message Queue Services
  nexus-rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nexus-rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=nexus
      - RABBITMQ_DEFAULT_PASS=${NEXUS_RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=asimnexus
    volumes:
      - nexus_rabbitmq_data:/var/lib/rabbitmq
      - nexus_rabbitmq_config:/etc/rabbitmq
    networks:
      - nexus-network
    ports:
      - "5672:5672"
      - "15672:15672"
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Monitoring Services
  nexus-prometheus:
    image: prom/prometheus:latest
    container_name: nexus-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - nexus_prometheus_data:/prometheus
    networks:
      - nexus-network
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  nexus-grafana:
    image: grafana/grafana:latest
    container_name: nexus-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${NEXUS_GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - nexus_grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - nexus-network
    ports:
      - "3001:3000"
    depends_on:
      - nexus-prometheus
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Load Balancer
  nexus-nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - nexus_nginx_logs:/var/log/nginx
    networks:
      - nexus-network
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nexus-api-gateway
      - nexus-dashboard
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

# Network Configuration
networks:
  nexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1

# Volume Configuration
volumes:
  # Data Volumes
  nexus_data:
    driver: local
  nexus_events:
    driver: local
  nexus_resources:
    driver: local
  nexus_kernel:
    driver: local
  nexus_mesh:
    driver: local
  nexus_models:
    driver: local
  nexus_inference:
    driver: local
  nexus_identity:
    driver: local
  nexus_security:
    driver: local
  nexus_dashboard:
    driver: local
  nexus_api:
    driver: local
  
  # Database Volumes
  nexus_postgres_data:
    driver: local
  nexus_postgres_config:
    driver: local
  nexus_redis_data:
    driver: local
  nexus_redis_config:
    driver: local
  nexus_rabbitmq_data:
    driver: local
  nexus_rabbitmq_config:
    driver: local
  
  # Monitoring Volumes
  nexus_prometheus_data:
    driver: local
  nexus_grafana_data:
    driver: local
  nexus_nginx_logs:
    driver: local
  
  # Log Volume
  nexus_logs:
    driver: local

# Health Check Configuration
x-health-checks: &default-health-check
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

# Auto-scaling Configuration
x-scaling: &default-scaling
  replicas: 1
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
    window: 120s

# Production Overrides
x-production: &production-config
  <<: *default-scaling
  resources:
    limits:
      cpus: '2.0'
      memory: 4G
    reservations:
      cpus: '1.0'
      memory: 2G

# Development Overrides
x-development: &development-config
  <<: *default-scaling
  resources:
    limits:
      cpus: '1.0'
      memory: 2G
    reservations:
      cpus: '0.5'
      memory: 1G
