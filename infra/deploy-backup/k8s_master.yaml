# ASIMNEXUS Kubernetes Master Configuration
# =====================================
# Complete K8s deployment for ASIMNEXUS Global OS
# Supports NVIDIA NIM API integration and auto-scaling

apiVersion: v1
kind: Namespace
metadata:
  name: asimnexus
  labels:
    name: asimnexus
    purpose: universal-os

---
# ConfigMap for ASIMNEXUS configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: asimnexus-config
  namespace: asimnexus
data:
  NODE_ENV: "production"
  ASIMNEXUS_MODE: "kubernetes"
  LOG_LEVEL: "info"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  POSTGRES_HOST: "postgres-service"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "asimnexus"
  NVIDIA_NIM_ENDPOINT: "https://api.nvidia.com/v1"
  AUTO_SCALE_ENABLED: "true"
  GPU_ACCELERATION: "true"

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: asimnexus-secrets
  namespace: asimnexus
type: Opaque
data:
  # Base64 encoded values (replace with actual encoded values)
  POSTGRES_USER: cG9zdGdyZXM=  # postgres
  POSTGRES_PASSWORD: cGFzc3dvcmQ=  # password
  NVIDIA_API_KEY: eW91ci1bmlkaWEtYXBpLWtleQ==  # your-nvidia-api-key
  JWT_SECRET: YXNpbW5leHVzLWp3dC1zZWNyZXQ=  # asimnexus-jwt-secret

---
# Persistent Volume for PostgreSQL
apiVersion: v1
kind: PersistentVolume
metadata:
  name: postgres-pv
  namespace: asimnexus
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /data/asimnexus/postgres

---
# Persistent Volume Claim for PostgreSQL
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: asimnexus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# PostgreSQL Database
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: asimnexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: asimnexus-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: asimnexus-secrets
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: asimnexus-secrets
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: asimnexus
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  type: ClusterIP

---
# Redis Cache
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: asimnexus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: asimnexus
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# ASIMNEXUS Backend API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-backend
  namespace: asimnexus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asimnexus-backend
  template:
    metadata:
      labels:
        app: asimnexus-backend
    spec:
      containers:
      - name: asimnexus-backend
        image: asimnexus/backend:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: asimnexus-config
        - secretRef:
            name: asimnexus-secrets
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-backend-service
  namespace: asimnexus
spec:
  selector:
    app: asimnexus-backend
  ports:
  - port: 8000
    targetPort: 8000
  type: LoadBalancer

---
# ASIMNEXUS Frontend
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-frontend
  namespace: asimnexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asimnexus-frontend
  template:
    metadata:
      labels:
        app: asimnexus-frontend
    spec:
      containers:
      - name: asimnexus-frontend
        image: asimnexus/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://asimnexus-backend-service:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-frontend-service
  namespace: asimnexus
spec:
  selector:
    app: asimnexus-frontend
  ports:
  - port: 3000
    targetPort: 3000
  type: LoadBalancer

---
# NVIDIA GPU Worker Pods (for AI model execution)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-gpu-worker
  namespace: asimnexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asimnexus-gpu-worker
  template:
    metadata:
      labels:
        app: asimnexus-gpu-worker
    spec:
      containers:
      - name: gpu-worker
        image: asimnexus/gpu-worker:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: asimnexus-config
        - secretRef:
            name: asimnexus-secrets
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: 1
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: 1
        volumeMounts:
        - name: model-cache
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      nodeSelector:
        accelerator: nvidia-tesla-k80  # Adjust based on available GPU nodes

---
# GPU Worker Service
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-gpu-worker-service
  namespace: asimnexus
spec:
  selector:
    app: asimnexus-gpu-worker
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

---
# Model Cache Persistent Volume
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-cache-pvc
  namespace: asimnexus
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi

---
# Horizontal Pod Autoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asimnexus-backend-hpa
  namespace: asimnexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asimnexus-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Horizontal Pod Autoscaler for GPU Workers
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asimnexus-gpu-worker-hpa
  namespace: asimnexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asimnexus-gpu-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# Ingress for External Access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asimnexus-ingress
  namespace: asimnexus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - asimnexus.yourdomain.com
    secretName: asimnexus-tls
  rules:
  - host: asimnexus.yourdomain.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: asimnexus-backend-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: asimnexus-frontend-service
            port:
              number: 3000

---
# Network Policy for Security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: asimnexus-network-policy
  namespace: asimnexus
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: asimnexus
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 3000
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: asimnexus
    - to: []
      ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 53   # DNS
    - protocol: UDP
      port: 53   # DNS

---
# Resource Quota for ASIMNEXUS Namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: asimnexus-quota
  namespace: asimnexus
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "20"
    configmaps: "20"
  scopes:
  - Namespaced
