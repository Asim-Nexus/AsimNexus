# ASIMNEXUS Docker Compose Configuration
# Multi-service orchestration for development and production

version: '3.8'

services:
  # ASIMNEXUS Core Application
  asimnexus:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile
    container_name: asimnexus-core
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://user:password@postgres:5432/asimnexus
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - asimnexus-data:/app/data
      - asimnexus-logs:/app/logs
    restart: unless-stopped
    networks:
      - asimnexus-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: asimnexus-postgres
    environment:
      - POSTGRES_DB=asimnexus
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - asimnexus-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - asimnexus-network

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: asimnexus-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    networks:
      - asimnexus-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: asimnexus-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - asimnexus-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: asimnexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - asimnexus
    restart: unless-stopped
    networks:
      - asimnexus-network

volumes:
  asimnexus-data:
  asimnexus-logs:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  asimnexus-network:
    driver: bridge
