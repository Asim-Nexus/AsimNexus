# ASIMNEXUS Kubernetes Service Configuration
# Exposes the application to the cluster and external traffic

apiVersion: v1
kind: Service
metadata:
  name: asimnexus
  namespace: default
  labels:
    app: asimnexus
spec:
  type: LoadBalancer
  selector:
    app: asimnexus
  ports:
  - name: http
    port: 80
    targetPort: 8000
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8000
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
# Internal Service for cluster communication
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-internal
  namespace: default
  labels:
    app: asimnexus
spec:
  type: ClusterIP
  selector:
    app: asimnexus
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: asimnexus
  namespace: default
  labels:
    app: asimnexus
spec:
  selector:
    matchLabels:
      app: asimnexus
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
