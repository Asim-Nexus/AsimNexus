# ASIMNEXUS iOS App - Apple App Store
# ====================================

app_name: "ASIMNEXUS"
bundle_id: "ai.asimnexus.app"
version: "1.0.0"
build: 1

# Platform Requirements
platform:
  ios:
    min_version: "15.0"  # iOS 15+
    devices: ["iPhone", "iPad"]
  
  macos:
    min_version: "12.0"  # macOS Monterey+
    architecture: ["arm64", "x86_64"]

# App Size
app_size:
  iphone: "48MB"   # Compressed with Q4_K_M model
  ipad: "52MB"
  universal: "85MB"

# Capabilities (iOS entitlements)
capabilities:
  - "com.apple.security.network.client"
  - "com.apple.security.network.server"
  - "com.apple.developer.siri"
  - "com.apple.developer.homekit"
  - "com.apple.developer.background-modes"

# Background Modes
background_modes:
  - "audio"
  - "location"
  - "processing"
  - "fetch"

# App Store Information
app_store:
  name: "ASIMNEXUS"
  subtitle: "Your Personal AI"
  
  description: |
    Meet ASIMNEXUS - an AI that truly understands you.
    
    ASIMNEXUS learns from every conversation, adapts to
    your preferences, and becomes more helpful over time.
    
    Key Features:
    • On-device AI (privacy-first)
    • Smart task management
    • Home automation control
    • Schedule optimization
    • Financial insights
    • Nepali language support
    
    Unlike cloud-only AI assistants, ASIMNEXUS runs
    primarily on your device, keeping your data private
    while still learning and improving.
    
    ASIMNEXUS respects your culture, speaks your
    language, and works the way you do.
  
  keywords:
    - "AI assistant"
    - "personal AI"
    - "task automation"
    - "smart home"
    - "Nepal"
    - "privacy"
  
  category: "Productivity"
  secondary_category: "Lifestyle"
  
  # Rating
  content_rating:
    age: "4+"
    violence: "none"
    profanity: "none"
    mature_content: "none"
  
  # Screenshots (required: iPhone, optional: iPad)
  screenshots:
    iphone_6_5:
      - "screenshots/iphone/chat.png"
      - "screenshots/iphone/tasks.png"
      - "screenshots/iphone/home.png"
    
    iphone_5_5:
      - "screenshots/iphone55/chat.png"
      - "screenshots/iphone55/tasks.png"
    
    ipad_12_9:
      - "screenshots/ipad/dashboard.png"
      - "screenshots/ipad/multitask.png"
  
  # App Preview Video (optional)
  preview_video: "assets/app_preview.mp4"
  
  # App Icon
  icon:
    original: "assets/icon_1024x1024.png"
    transparent: false

# Supported Locales
locales:
  primary: "en-US"
  additional:
    - "ne-NP"  # Nepali
    - "hi-IN"  # Hindi
    - "en-GB"
    - "en-AU"
    - "en-CA"

# Pricing & Availability
pricing:
  free: true
  
  in_app_purchases:
    - id: "com.asimnexus.premium.monthly"
      type: "subscription"
      price: "$4.99"
      period: "month"
      name: "ASIM Premium"
    
    - id: "com.asimnexus.family.monthly"
      type: "subscription"
      price: "$9.99"
      period: "month"
      name: "ASIM Family"
  
  availability:
    all_countries: true
    except: []  # No exceptions

# App Review Information
review:
  first_name: "[Your Name]"
  last_name: "[Your Surname]"
  email: "dev@asimnexus.ai"
  phone: "+977-XXX-XXXXXXX"
  
  notes: |
    ASIMNEXUS is an AI assistant that runs on-device
    for privacy. It uses local ML models and only
    connects to cloud for optional advanced features.
    
    Demo account:
    - Email: demo@asimnexus.ai
    - Password: Demo123!
  
  demo_required: false

# Export Compliance
export_compliance:
  uses_encryption: true
  is_exempt: false
  encryption_description: |
    ASIMNEXUS uses standard TLS/SSL encryption
    for network communications. All local data
    is encrypted using AES-256.
