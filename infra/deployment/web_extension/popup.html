<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ASIMNEXUS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    
    .header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }
    
    .logo {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .subtitle {
      font-size: 12px;
      opacity: 0.8;
    }
    
    .status {
      padding: 10px 20px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .chat-container {
      height: 300px;
      overflow-y: auto;
      padding: 15px;
      background: rgba(255,255,255,0.05);
    }
    
    .message {
      margin-bottom: 15px;
      padding: 10px 15px;
      border-radius: 15px;
      max-width: 85%;
      font-size: 14px;
      line-height: 1.4;
    }
    
    .message.user {
      background: rgba(255,255,255,0.2);
      margin-left: auto;
      border-bottom-right-radius: 5px;
    }
    
    .message.asim {
      background: rgba(255,255,255,0.15);
      border-bottom-left-radius: 5px;
    }
    
    .input-area {
      padding: 15px;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    
    .input-wrapper {
      display: flex;
      gap: 10px;
    }
    
    input[type="text"] {
      flex: 1;
      padding: 12px 15px;
      border: none;
      border-radius: 25px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 14px;
      outline: none;
    }
    
    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.6);
    }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 25px;
      background: white;
      color: #667eea;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    button:hover {
      transform: scale(1.05);
    }
    
    .quick-actions {
      padding: 10px 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    
    .action-btn {
      padding: 8px 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.15);
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .action-btn:hover {
      background: rgba(255,255,255,0.25);
    }
    
    .footer {
      padding: 10px 15px;
      text-align: center;
      font-size: 11px;
      opacity: 0.7;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🧠 ASIMNEXUS</div>
    <div class="subtitle">Your AI Companion</div>
  </div>
  
  <div class="status">
    <div class="status-dot"></div>
    <span>Connected to ASIM Cloud</span>
  </div>
  
  <div class="chat-container" id="chat">
    <div class="message asim">
      👋 Hi! I'm ASIM. How can I help you today?
    </div>
  </div>
  
  <div class="quick-actions">
    <button class="action-btn" id="summarize">Summarize Page</button>
    <button class="action-btn" id="explain">Explain This</button>
    <button class="action-btn" id="write">Help Write</button>
  </div>
  
  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="Type your message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>
  
  <div class="footer">
    Press Ctrl+Shift+Space to open chat anywhere
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
