# ASIMNEXUS — Docker Compose (Development)
# ============================================
# Quick start: docker compose -f infra/docker/docker-compose.yml up -d
# Or from root: docker compose -f infra/docker/docker-compose.yml up -d

services:
  # ── Core Backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: asimnexus-backend
    ports:
      - "8000:8000" # Main API
      - "8766:8766" # WebSocket
      - "8080:8080" # Alternative API
    volumes:
      - ../../data:/app/data
      - ../../memory:/app/memory
      - ../../logs:/app/logs
      - ../../config:/app/config
      - ../../.env.example:/app/.env
    environment:
      - ASIM_ENV=development
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
      - ASIM_JWT_SECRET=${ASIM_JWT_SECRET:-dev-secret-change-in-prod}
      - ASIM_ALLOWED_ORIGINS=${ASIM_ALLOWED_ORIGINS:-http://localhost:3000}
      - ASIM_DATA_DIR=/app/data
      - DATABASE_URL=sqlite:///./data/asimnexus.db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asimnexus-network
    profiles:
      - core

  # ── Mesh Networking Ports ────────────────────────────────────────────────
  # Mesh ports exposed on host for P2P functionality
  # 7331/udp - LAN Discovery
  # 7332/udp - Kademlia DHT
  # 7333     - WebSocket P2P
  # 7334     - Relay Service
  # 7335     - Bootstrap Service
  # 7336/udp - Rendezvous Service

  # ── Redis (Cache) ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asimnexus-network
    profiles:
      - cache
      - full

  # ── PostgreSQL (Primary Database) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: asimnexus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=asimnexus
      - POSTGRES_USER=asimnexus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-asimnexus}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U asimnexus" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - asimnexus-network
    profiles:
      - database
      - full

  # ── Frontend (React) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile
    container_name: asimnexus-frontend
    ports:
      - "3000:3000"
    volumes:
      - ../../apps/frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - asimnexus-network
    profiles:
      - frontend
      - full

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: asimnexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../../infra/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    networks:
      - asimnexus-network
    profiles:
      - proxy
      - full

volumes:
  data:
    driver: local
  memory:
    driver: local
  logs:
    driver: local
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  asimnexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
