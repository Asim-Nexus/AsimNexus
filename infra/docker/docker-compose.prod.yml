# ASIMNEXUS Production Docker Compose
# ==================================
# Production-grade deployment with PostgreSQL, monitoring

version: '3.8'

services:
  # Backend API
  backend:
    image: ghcr.io/asimnexus/asimnexus:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://asimnexus:${POSTGRES_PASSWORD}@postgres:5432/asimnexus
      - ASIM_NODE_ID=backend-${HOSTNAME}
      - ASIM_ENVIRONMENT=production
      - ASIM_COUNTRY=NP
    volumes:
      - asimnexus_data:/app/data
      - asimnexus_logs:/app/logs
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    image: ghcr.io/asimnexus/asimnexus-frontend:latest
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - backend

  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: asimnexus
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    secrets:
      - postgres_password
    restart: unless-stopped

  # Redis (Cache + Session)
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # Grafana (Monitoring UI)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  asimnexus_data:
  asimnexus_logs:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: