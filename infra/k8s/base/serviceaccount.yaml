apiVersion: v1
kind: ServiceAccount
metadata:
  name: asimnexus-sa
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: asimnexus-role
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: asimnexus-rolebinding
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
subjects:
- kind: ServiceAccount
  name: asimnexus-sa
  namespace: asimnexus
roleRef:
  kind: Role
  name: asimnexus-role
  apiGroup: rbac.authorization.k8s.io
