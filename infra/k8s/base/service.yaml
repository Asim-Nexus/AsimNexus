apiVersion: v1
kind: Service
metadata:
  name: asimnexus-backend
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    name: http
    protocol: TCP
  - port: 8765
    targetPort: 8765
    name: mesh
    protocol: TCP
  - port: 9090
    targetPort: 9090
    name: metrics
    protocol: TCP
  selector:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: backend
---
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-frontend
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
    name: http
    protocol: TCP
  selector:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: frontend
