apiVersion: v1
kind: ConfigMap
metadata:
  name: asimnexus-config
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: config
data:
  # Application Configuration
  APP_NAME: "AsimNexus"
  APP_ENV: "production"
  LOG_LEVEL: "INFO"
  API_PREFIX: "/api/v1"
  CORS_ORIGINS: "https://app.asimnexus.com"

  # Database
  DB_HOST: "postgresql.asimnexus.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "asimnexus"

  # Redis
  REDIS_HOST: "redis.asimnexus.svc.cluster.local"
  REDIS_PORT: "6379"

  # Mesh Network
  MESH_PORT: "8765"
  MESH_PROTOCOL: "kademlia"
  MESH_BOOTSTRAP_NODES: "bootstrap.asimnexus.com:8765"

  # Monitoring
  PROMETHEUS_PORT: "9090"
  METRICS_ENABLED: "true"
  JAEGER_AGENT_HOST: "jaeger-agent.asimnexus.svc.cluster.local"
  JAEGER_AGENT_PORT: "6831"

  # Rate Limiting
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"

  # Feature Flags
  FEATURE_DHARMA_VETO: "true"
  FEATURE_CLONE_CONSENSUS: "true"
  FEATURE_MIRROR: "true"
  FEATURE_MESH: "true"
  FEATURE_OFFLINE_SYNC: "true"
  FEATURE_ZKP: "true"
