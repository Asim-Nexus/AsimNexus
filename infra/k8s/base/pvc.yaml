apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-data-pvc
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-postgres-pvc
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-redis-pvc
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: cache
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
