apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: asimnexus-ingress
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://app.asimnexus.com"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.asimnexus.com
    - app.asimnexus.com
    secretName: asimnexus-tls
  rules:
  - host: api.asimnexus.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: asimnexus-backend
            port:
              number: 8000
  - host: app.asimnexus.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: asimnexus-frontend
            port:
              number: 80
