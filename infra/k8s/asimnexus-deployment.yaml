apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-core
  namespace: asimnexus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asimnexus-core
  template:
    metadata:
      labels:
        app: asimnexus-core
    spec:
      containers:
      - name: asimnexus
        image: asimnexus/core:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-service
  namespace: asimnexus
spec:
  selector:
    app: asimnexus-core
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: LoadBalancer
