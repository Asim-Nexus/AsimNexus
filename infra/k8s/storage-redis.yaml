apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-storage
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: redis
spec:
  serviceName: redis-storage
  replicas: 1
  selector:
    matchLabels:
      app: asimnexus
      tier: storage
      component: redis
  template:
    metadata:
      labels:
        app: asimnexus
        tier: storage
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "512mb"
            - --maxmemory-policy
            - allkeys-lru
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "0.25"
            limits:
              memory: "1Gi"
              cpu: "1"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-storage
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: redis
spec:
  selector:
    app: asimnexus
    tier: storage
    component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  type: ClusterIP
