apiVersion: v1
kind: ConfigMap
metadata:
  name: asimnexus-config
  namespace: asimnexus
data:
  config.yaml: |
    # ASIMNEXUS Configuration
    environment: production
    log_level: INFO
    
    # Founder Configuration
    founders:
      count: 15
      auto_update: true
      emergency_override: true
    
    # Agent Configuration
    agents:
      count: 10
      auto_scaling: true
      max_agents: 50
    
    # Security Configuration
    security:
      zero_trust: true
      mfa_required: true
      session_timeout: 3600
    
    # API Configuration
    api:
      rate_limit: 1000
      cache_ttl: 300
      version: v1
