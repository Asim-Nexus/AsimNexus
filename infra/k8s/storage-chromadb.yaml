apiVersion: apps/v1
kind: Deployment
metadata:
  name: chromadb
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: chromadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asimnexus
      tier: storage
      component: chromadb
  template:
    metadata:
      labels:
        app: asimnexus
        tier: storage
        component: chromadb
    spec:
      containers:
        - name: chromadb
          image: chromadb/chroma:0.5.1
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: IS_PERSISTENT
              value: "TRUE"
            - name: PERSIST_DIRECTORY
              value: "/chroma/chroma"
            - name: ANONYMIZED_TELEMETRY
              value: "FALSE"
          volumeMounts:
            - name: chroma-data
              mountPath: /chroma/chroma
          resources:
            requests:
              memory: "1Gi"
              cpu: "0.5"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/heartbeat
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: chroma-data
          persistentVolumeClaim:
            claimName: chroma-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chromadb
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: chromadb
spec:
  selector:
    app: asimnexus
    tier: storage
    component: chromadb
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP
