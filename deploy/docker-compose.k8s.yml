# ASIMNEXUS Docker Compose for Kubernetes Development
# ================================================
# Local development with K8s-like orchestration
# Supports NVIDIA GPU and auto-scaling simulation

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: asimnexus-postgres
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - asimnexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asimnexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - asimnexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ASIMNEXUS Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: asimnexus/backend:latest
    container_name: asimnexus-backend
    environment:
      NODE_ENV: production
      ASIMNEXUS_MODE: docker
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: asimnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      NVIDIA_NIM_ENDPOINT: https://api.nvidia.com/v1
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-your-nvidia-api-key}
      JWT_SECRET: asimnexus-jwt-secret-key-2024
      AUTO_SCALE_ENABLED: "true"
      GPU_ACCELERATION: "true"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - model_cache:/models
    ports:
      - "8000:8000"
    networks:
      - asimnexus-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # ASIMNEXUS Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: asimnexus/frontend:latest
    container_name: asimnexus-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000
      REACT_APP_ENV: production
    volumes:
      - ./frontend/build:/app/build
    ports:
      - "3000:3000"
    networks:
      - asimnexus-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # GPU Worker (requires NVIDIA runtime)
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: gpu-worker
    image: asimnexus/gpu-worker:latest
    container_name: asimnexus-gpu-worker
    environment:
      NODE_ENV: production
      WORKER_TYPE: gpu
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NVIDIA_NIM_ENDPOINT: https://api.nvidia.com/v1
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-your-nvidia-api-key}
      MODEL_CACHE_DIR: /models
      GPU_MEMORY_LIMIT: 6GB
      MAX_BATCH_SIZE: 4
    volumes:
      - model_cache:/models
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
          nvidia.com/gpu: 1
        reservations:
          cpus: '1.0'
          memory: 4G
          nvidia.com/gpu: 1
    runtime: nvidia  # Requires NVIDIA Container Toolkit

  # CPU Worker
  cpu-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: cpu-worker
    image: asimnexus/cpu-worker:latest
    container_name: asimnexus-cpu-worker
    environment:
      NODE_ENV: production
      WORKER_TYPE: cpu
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MODEL_CACHE_DIR: /models
      MAX_BATCH_SIZE: 2
    volumes:
      - model_cache:/models
      - ./logs:/app/logs
    ports:
      - "8081:8080"
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: asimnexus-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - asimnexus-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: asimnexus-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_storage:/prometheus
    ports:
      - "9090:9090"
    networks:
      - asimnexus-network
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: asimnexus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - asimnexus-network
    depends_on:
      - prometheus
    restart: unless-stopped

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: asimnexus-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: 9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "14250:14250/udp"
    networks:
      - asimnexus-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_cache:
    driver: local
  prometheus_storage:
    driver: local
  grafana_storage:
    driver: local

networks:
  asimnexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
