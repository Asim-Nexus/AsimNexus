# ─── AsimNexus Docker Compose ────────────────────────────────────────────────
# Local multi-service development stack
# Usage:  docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  asimnexus-backend:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: asimnexus-backend
    ports:
      - "8080:8080"
    volumes:
      - asimnexus-data:/app/data
    environment:
      - ASIM_DEPLOY_NAMESPACE=asimnexus
      - ASIM_RELEASE_CHANNEL=stable
      - ASIM_CONTAINER_PORT=8080
      - ASIM_REMOTE_PUBLISH=false
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  asimnexus-data:
    driver: local
