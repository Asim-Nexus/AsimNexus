name: Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  security:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit
        continue-on-error: true

      - name: Run pip-audit and save report
        run: python -m pip_audit --format json > pip_audit.json || true
        continue-on-error: true

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.0
        continue-on-error: true

      - name: Run gitleaks (secrets scan)
        uses: zricethezav/gitleaks-action@v2.10.0
        with:
          args: '--path=. --redact --config=.gitleaks.toml'
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            pip_audit.json
        continue-on-error: true
