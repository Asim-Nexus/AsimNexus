name: Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 3 * * 1'

jobs:
  security:
    name: security-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # Pin: actions/checkout@<sha>
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        # Pin: actions/setup-python@<sha>
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit

      - name: Run pip-audit and save report
        run: python -m pip_audit --format json > pip_audit.json || true

      - name: Run pre-commit
        uses: pre-commit/action@v4.4.0
        # Specific version pinned — good

      - name: Run gitleaks (secrets scan)
        uses: zricethezav/gitleaks-action@v2.10.3
        # Specific version pinned — good
        with:
          args: '--path=. --redact --config=.gitleaks.toml'

      - name: Setup Node.js for npm audit (optional)
        uses: actions/setup-node@v4
        # Pin: actions/setup-node@<sha>
        with:
          node-version: '18'

      - name: Run npm audit if package.json present
        run: |
          if [ -f package.json ]; then
            npm ci --no-audit --no-fund || true
            npm audit --json > npm_audit.json || true
          else
            echo "No package.json found; skipping npm audit"
          fi

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        # Pin: actions/upload-artifact@<sha>
        with:
          name: security-reports
          path: |
            pip_audit.json
            npm_audit.json
