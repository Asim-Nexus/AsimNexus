name: ASIMNEXUS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'

jobs:
  # ── Lint & Code Quality ──────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-lint-
    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black mypy
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=.venv,node_modules,__pycache__,.git,frontend,scripts,*.pyc
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=.venv,node_modules,__pycache__,.git,frontend,scripts,*.pyc
    - name: Check formatting with black
      continue-on-error: true
      run: |
        pip install black
        black --check --diff core/ routes/ security/ --exclude=".*\.pyc|__pycache__|.venv"

  # ── Unit & Integration Tests ─────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']
        test-suite:
          - "tests/unit/"
          - "tests/integration/"
          - "tests/real/"
          - "tests/e2e/"
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-test-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        grep -vi "cupy-cuda\|^torch\|cudf\|sentence-transformers" requirements.txt > /tmp/requirements-ci.txt
        pip install --use-deprecated=legacy-resolver -r /tmp/requirements-ci.txt
        pip install pytest pytest-cov pytest-timeout pytest-asyncio
    - name: Run ${{ matrix.test-suite }} tests
      run: |
        pytest ${{ matrix.test-suite }} -v --cov=core --cov=routes --cov=app --cov-report=xml --cov-append --ignore=scripts --ignore=frontend --ignore=node_modules --timeout=120 2>&1 | tail -50
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: ${{ matrix.test-suite }}
        name: codecov-${{ matrix.test-suite }}

  # ── Build Docker Images ──────────────────────────────────────────────
  build:
    needs: test
    if: always() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build-backend.outputs.digest }}
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Downcase IMAGE_NAME
      run: echo "IMAGE_NAME=$(echo ${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    - name: Build and push Backend
      id: build-backend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: infrastructure/docker/Dockerfile.backend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64
    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: .
        file: infrastructure/docker/Dockerfile.frontend
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}-frontend
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64

  # ── Deploy to Staging ────────────────────────────────────────────────
  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to Staging
      env:
        SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        SSH_HOST: ${{ secrets.STAGING_HOST }}
        SSH_USER: ${{ secrets.STAGING_USER }}
      run: |
        if [ -z "$SSH_KEY" ] || [ -z "$SSH_HOST" ]; then
          echo "⚠️ Staging SSH secrets not configured — skipping"
          exit 0
        fi
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh "$SSH_USER@$SSH_HOST" "
          cd /opt/asimnexus/staging &&
          docker compose pull &&
          docker compose up -d --remove-orphans &&
          echo '✅ Staging deploy complete'
        "

  # ── Deploy to Production ─────────────────────────────────────────────
  deploy-production:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency: production
    steps:
    - uses: actions/checkout@v4
    - name: Deploy via SSH
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_HOST_KEY: ${{ secrets.SSH_HOST_KEY }}
        SSH_USER: ${{ secrets.SSH_USER }}
        SSH_HOST: ${{ secrets.SSH_HOST }}
      run: |
        if [ -z "$SSH_KEY" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_HOST" ]; then
          echo "⚠️ SSH secrets not configured — skipping deploy"
          exit 0
        fi
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
        if [ -n "$SSH_HOST_KEY" ]; then
          echo "$SSH_HOST_KEY" >> ~/.ssh/known_hosts
        else
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
        fi
        ssh "$SSH_USER@$SSH_HOST" "
          cd /opt/asimnexus &&
          docker compose -f infrastructure/docker/docker-compose.prod.yml pull &&
          docker compose -f infrastructure/docker/docker-compose.prod.yml up -d --remove-orphans &&
          echo '✅ Production deploy complete'
        "
    - name: Health check
      run: |
        sleep 30
        if [ -n "$SSH_HOST" ]; then
          curl -f http://$SSH_HOST:8000/health/live || echo "⚠️ Health check warning"
        fi
