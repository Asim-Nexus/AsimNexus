# ASIMNEXUS Kubernetes ConfigMap
# Configuration data for the application

apiVersion: v1
kind: ConfigMap
metadata:
  name: asimnexus-config
  namespace: default
data:
  # Application Configuration
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  DEBUG: "false"
  
  # API Configuration
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  WORKERS: "4"
  
  # Database Configuration
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "asimnexus"
  
  # Redis Configuration
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Monitoring Configuration
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  
  # Feature Flags
  ENABLE_SELF_EVOLUTION: "true"
  ENABLE_CHAOS_ENGINEERING: "false"
  ENABLE_FORMAL_VERIFICATION: "true"
  
  # Integration Configuration
  ENABLE_TAVILY_SEARCH: "true"
  ENABLE_PERPLEXITY_SEARCH: "true"
  ENABLE_BRAVE_SEARCH: "true"
  
  # Payment Configuration
  ENABLE_STRIPE: "false"
  ENABLE_RAZORPAY: "false"
  ENABLE_PAYPAL: "false"
  
  # Voice Configuration
  ENABLE_ELEVENLABS: "false"
  ENABLE_EDGE_TTS: "true"
  
  # Vision Configuration
  ENABLE_VISION_MODELS: "false"
  
  # Local LLM Configuration
  ENABLE_LOCAL_LLM: "false"
  OLLAMA_URL: "http://localhost:11434"
  LM_STUDIO_URL: "http://localhost:1234"

---
# Secret for sensitive data (example - use actual secrets in production)
apiVersion: v1
kind: Secret
metadata:
  name: asimnexus-secrets
  namespace: default
type: Opaque
stringData:
  # Database Secrets
  database-url: "postgresql://user:password@postgres:5432/asimnexus"
  
  # Redis Secrets
  redis-url: "redis://:password@redis:6379/0"
  
  # API Keys (replace with actual values)
  tavily-api-key: ""
  perplexity-api-key: ""
  brave-api-key: ""
  stripe-api-key: ""
  razorpay-api-key: ""
  razorpay-api-secret: ""
  paypal-client-id: ""
  paypal-client-secret: ""
  google-maps-api-key: ""
  elevenlabs-api-key: ""
  nvidia-nim-api-key: ""

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-logs
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
