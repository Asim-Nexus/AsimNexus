# ASIMNEXUS Multi-Cloud Feature Distribution Configuration
# =====================================================
# Defines how ASIMNEXUS features are distributed across cloud providers
# Optimized for maximum free tier usage and load balancing

version: "1.0"

# Cloud provider configurations
clouds:
  aws:
    name: "Amazon Web Services"
    priority: 1
    weight: 40  # 40% of traffic
    free_tier:
      service: "ec2"
      instance_type: "t2.micro"
      free_hours: 750
      cpu: 1
      ram_gb: 1
      storage_gb: 30
      cost_per_hour: 0.0116
    features:
      - name: "llm_runtime"
        description: "Core LLM Runtime (Gemma 4)"
        priority: 1
        endpoint: "/api/llm/*"
      - name: "triple_brain"
        description: "Triple Brain System (Conscious, Subconscious, Unconscious)"
        priority: 1
        endpoint: "/api/brain/*"
      - name: "meta_harness"
        description: "Meta-Harness Model for self-correction"
        priority: 1
        endpoint: "/api/meta/*"
      - name: "self_learning"
        description: "Self-Learning Engine"
        priority: 1
        endpoint: "/api/learning/*"
    regions:
      - "us-east-1"
      - "us-west-2"
      - "eu-west-1"

  gcp:
    name: "Google Cloud Platform"
    priority: 2
    weight: 30  # 30% of traffic
    free_tier:
      service: "cloud_run"
      instance_type: "e2-micro"
      free_hours: 240
      cpu: 2
      ram_gb: 1
      requests_free: 2000000
      cost_per_hour: 0.0085
    features:
      - name: "polyglot"
        description: "Polyglot Engine (Multi-language support)"
        priority: 2
        endpoint: "/api/language/*"
      - name: "world_integrations"
        description: "World Integrations Hub"
        priority: 2
        endpoint: "/api/integrations/*"
      - name: "gov_apis"
        description: "Government API Connections"
        priority: 2
        endpoint: "/api/government/*"
      - name: "banking_apis"
        description: "Banking API Connections (UPI, bKash, etc.)"
        priority: 2
        endpoint: "/api/banking/*"
    regions:
      - "us-central1"
      - "europe-west1"
      - "asia-southeast1"

  azure:
    name: "Microsoft Azure"
    priority: 3
    weight: 20  # 20% of traffic
    free_tier:
      service: "container_instances"
      instance_type: "B1S"
      free_hours: 750
      cpu: 1
      ram_gb: 1
      cost_per_hour: 0.0104
    features:
      - name: "security"
        description: "Security Framework"
        priority: 3
        endpoint: "/api/security/*"
      - name: "vault"
        description: "Vault Manager (Encryption)"
        priority: 3
        endpoint: "/api/vault/*"
      - name: "identity"
        description: "Identity Manager"
        priority: 3
        endpoint: "/api/identity/*"
      - name: "consent"
        description: "Consent Manager"
        priority: 3
        endpoint: "/api/consent/*"
    regions:
      - "eastus"
      - "westeurope"
      - "southeastasia"

  oracle:
    name: "Oracle Cloud"
    priority: 4
    weight: 10  # 10% of traffic
    free_tier:
      service: "always_free"
      instance_type: "AMD.Standard.E4.Flex"
      free_hours: "infinite"
      cpu: 2
      ram_gb: 24
      storage_gb: 200
      egress_tb: 10
      cost_per_hour: 0
    features:
      - name: "database"
        description: "Database (PostgreSQL)"
        priority: 4
        endpoint: "/api/db/*"
      - name: "vector_db"
        description: "Vector Database for embeddings"
        priority: 4
        endpoint: "/api/vector/*"
      - name: "memory"
        description: "Long-term Memory Storage"
        priority: 4
        endpoint: "/api/memory/*"
      - name: "storage"
        description: "File Storage"
        priority: 4
        endpoint: "/api/storage/*"
    regions:
      - "us-ashburn-1"
      - "eu-frankfurt-1"
      - "ap-tokyo-1"

  heroku:
    name: "Heroku"
    priority: 5
    weight: 0  # Used only for mobile
    free_tier:
      service: "eco"
      instance_type: "eco"
      free_hours: 550
      cpu: 0.5
      ram_gb: 0.5
      cost_per_hour: 0.007
    features:
      - name: "mobile_api_gateway"
        description: "Mobile API Gateway"
        priority: 5
        endpoint: "/api/mobile/*"
      - name: "push_notifications"
        description: "Push Notifications"
        priority: 5
        endpoint: "/api/push/*"

  vercel:
    name: "Vercel"
    priority: 6
    weight: 0  # Used only for frontend
    free_tier:
      service: "hobby"
      bandwidth_gb: 100
      cost_per_hour: 0
    features:
      - name: "web_ui"
        description: "Web UI (React)"
        priority: 6
        endpoint: "/*"
      - name: "dashboard"
        description: "Dashboard"
        priority: 6
        endpoint: "/dashboard/*"
      - name: "documentation"
        description: "Documentation Site"
        priority: 6
        endpoint: "/docs/*"

  netlify:
    name: "Netlify"
    priority: 7
    weight: 0  # Used only for static assets
    free_tier:
      service: "free"
      bandwidth_gb: 100
      cost_per_hour: 0
    features:
      - name: "static_assets"
        description: "Static Assets (CSS, JS, Images)"
        priority: 7
        endpoint: "/assets/*"
      - name: "cdn"
        description: "CDN Distribution"
        priority: 7
        endpoint: "/cdn/*"
      - name: "edge_caching"
        description: "Edge Caching"
        priority: 7
        endpoint: "/cache/*"

  fly_io:
    name: "Fly.io"
    priority: 8
    weight: 0  # Used only for edge
    free_tier:
      service: "free"
      max_apps: 3
      cpu: 1
      ram_gb: 0.25
      storage_gb: 3
      cost_per_hour: 0
    features:
      - name: "edge_compute"
        description: "Edge Computing Nodes"
        priority: 8
        endpoint: "/edge/*"
      - name: "regional_api"
        description: "Regional API Endpoints"
        priority: 8
        endpoint: "/regional/*"
      - name: "low_latency"
        description: "Low-latency Services"
        priority: 8
        endpoint: "/fast/*"

# Load balancing strategy
load_balancing:
  method: "weighted_round_robin"
  
  # Geographic routing
  geographic_routing:
    us-east:
      primary: "aws"
      fallback: "gcp"
    us-west:
      primary: "aws"
      fallback: "gcp"
    europe:
      primary: "gcp"
      fallback: "azure"
    asia:
      primary: "azure"
      fallback: "gcp"
    south_america:
      primary: "aws"
      fallback: "oracle"
    africa:
      primary: "oracle"
      fallback: "aws"
  
  # Feature-based routing
  feature_routing:
    llm_runtime:
      primary: "aws"
      fallback: "gcp"
    polyglot:
      primary: "gcp"
      fallback: "aws"
    security:
      primary: "azure"
      fallback: "aws"
    database:
      primary: "oracle"
      fallback: "gcp"
    web_ui:
      primary: "vercel"
      fallback: "netlify"
    edge_compute:
      primary: "fly_io"
      fallback: "aws"
  
  # Auto-switching
  auto_switch:
    enabled: true
    check_interval: 300  # seconds
    threshold:
      cpu_high: 80
      cpu_low: 20
      memory_high: 85
      memory_low: 30
      error_rate: 0.05
  
  # Fallback strategy
  fallback:
    spot_instances: true
    spot_discount: 0.9  # 90% discount
    paid_tier_threshold: 0.95  # Switch to paid when 95% free tier used

# Free tier optimization
free_tier_optimization:
  enabled: true
  
  # Usage tracking
  tracking:
    interval: 60  # seconds
    retention_days: 90
  
  # Prediction
  prediction:
    enabled: true
    model: "linear_regression"
    forecast_days: 30
  
  # Auto-scaling
  auto_scaling:
    enabled: true
    scale_up_threshold: 0.8  # 80% free tier used
    scale_down_threshold: 0.3  # 30% free tier used
  
  # Cost optimization
  cost_optimization:
    enabled: true
    target_savings: 0.5  # 50% savings target
    spot_preference: true

# Health monitoring
health_monitoring:
  enabled: true
  
  checks:
    interval: 30  # seconds
    timeout: 10  # seconds
    retries: 3
  
  metrics:
    - cpu
    - memory
    - disk
    - network
    - request_rate
    - error_rate
    - latency
  
  alerts:
    enabled: true
    channels:
      - email
      - slack
      - webhook

# Global CDN
cdn:
  enabled: true
  provider: "cloudflare"
  
  # Cloudflare free tier
  free_tier:
    bandwidth: "unlimited"
    requests: "unlimited"
    edge_locations: 200+
  
  # Caching rules
  caching:
    static_assets:
      ttl: 31536000  # 1 year
    api_responses:
      ttl: 300  # 5 minutes
    html:
      ttl: 3600  # 1 hour
  
  # Geographic distribution
  geographic_distribution:
    enabled: true
    regions:
      - "us"
      - "eu"
      - "asia"
      - "south_america"
      - "africa"
