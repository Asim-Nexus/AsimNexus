# =============================================================================
# ASIMNEXUS Alertmanager Configuration
# =============================================================================
# Controls how Prometheus alerts are routed, grouped, and notified.
#
# Routes:
#   critical       — PagerDuty + Email (immediate)
#   warning        — Email only (aggregated)
#   security       — PagerDuty + Email + Slack (immediate)
#   ops            — Email + Slack (business hours)
# =============================================================================

global:
  # ── Resolve timeout — alert auto-resolves after this long without updates ─
  resolve_timeout: 5m

  # ── SMTP (email) ─────────────────────────────────────────────────────────
  smtp_smarthost:     '${SMTP_HOST}:${SMTP_PORT:-587}'
  smtp_from:          'alertmanager@asimnexus.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls:   true

  # ── Slack ─────────────────────────────────────────────────────────────────
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # ── PagerDuty ─────────────────────────────────────────────────────────────
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

# ── Route tree ────────────────────────────────────────────────────────────
route:
  receiver:  'default'
  group_by:  ['alertname', 'severity', 'team']
  group_wait:       30s
  group_interval:   5m
  repeat_interval:  4h

  routes:

    # ── Critical alerts → PagerDuty immediately ──────────────────────────
    - receiver: 'pagerduty-critical'
      match:
        severity: critical
      repeat_interval: 1h  # re-notify every 1h until resolved

    # ── Security alerts → PagerDuty + Slack + Email ──────────────────────
    - receiver: 'security-team'
      match:
        team: security
      repeat_interval: 30m

    # ── Ops alerts → Slack (don't page for infra) ────────────────────────
    - receiver: 'ops-team'
      match:
        team: ops
      repeat_interval: 2h

    # ── Warning alerts → Email only, aggregated ──────────────────────────
    - receiver: 'email-warning'
      match:
        severity: warning
      continue: false

# ── Receivers ─────────────────────────────────────────────────────────────
receivers:

  # ── Default: log only (no external notification) ──────────────────────
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:9093/log'

  # ── Critical: PagerDuty ───────────────────────────────────────────────
  - name: 'pagerduty-critical'
    pagerduty_configs:
      - routing_key:  '${PAGERDUTY_ROUTING_KEY}'
        severity:     'critical'
        description:  '{{ .GroupLabels.alertname }} — {{ .CommonAnnotations.summary }}'
        client:       'ASIMNEXUS Alertmanager'
        details:
          firing:     '{{ .Alerts.Firing | len }}'
          resolved:   '{{ .Alerts.Resolved | len }}'
          info:       '{{ .CommonAnnotations.description }}'
    email_configs:
      - to:              'oncall@asimnexus.com'
        send_resolved:   true
        headers:
          subject:       '[CRITICAL] {{ .GroupLabels.alertname }}'

  # ── Security: PagerDuty + Slack + Email ───────────────────────────────
  - name: 'security-team'
    pagerduty_configs:
      - routing_key:  '${PAGERDUTY_ROUTING_KEY}'
        severity:     'critical'
        client:       'ASIMNEXUS Security'
    slack_configs:
      - channel:       '#security-alerts'
        title:         '{{ .GroupLabels.alertname }}'
        text:          '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'
        username:      'ASIMNEXUS Security Bot'
        icon_emoji:    ':shield:'
        send_resolved: true
    email_configs:
      - to:              'security@asimnexus.com'
        send_resolved:   true
        headers:
          subject:       '[SECURITY] {{ .GroupLabels.alertname }}'

  # ── Ops: Slack + Email ────────────────────────────────────────────────
  - name: 'ops-team'
    slack_configs:
      - channel:       '#ops-alerts'
        title:         '{{ .GroupLabels.alertname }}'
        text:          '{{ .CommonAnnotations.summary }}'
        username:      'ASIMNEXUS Ops Bot'
        icon_emoji:    ':warning:'
        send_resolved: true
    email_configs:
      - to:              'ops@asimnexus.com'
        send_resolved:   true
        headers:
          subject:       '[OPS] {{ .GroupLabels.alertname }}'

  # ── Warning: Email only ───────────────────────────────────────────────
  - name: 'email-warning'
    email_configs:
      - to:              'oncall@asimnexus.com'
        send_resolved:   true
        headers:
          subject:       '[WARNING] {{ .GroupLabels.alertname }} — {{ .GroupLabels.team }}'
        html: |
          <h2>{{ .GroupLabels.alertname }}</h2>
          <p><strong>Severity:</strong> {{ .GroupLabels.severity }}</p>
          <p><strong>Summary:</strong> {{ .CommonAnnotations.summary }}</p>
          <p><strong>Description:</strong></p>
          <pre>{{ .CommonAnnotations.description }}</pre>
          <hr/>
          <p>Alerts: {{ .Alerts.Firing | len }} firing, {{ .Alerts.Resolved | len }} resolved</p>

# ── Inhibition rules ──────────────────────────────────────────────────────
# Suppress lower-severity alerts when a critical parent is firing.
inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname']
