# ASIMNEXUS Local Docker Deployment with CUDA GPU Support
# ==========================================================
# Optimized docker-compose for local development with Gemma 4 LLM on NVIDIA GPU

services:
  # ASIMNEXUS Core Service (Frontend + Backend) with GPU Acceleration
  asimnexus:
    build: .
    container_name: asimnexus
    restart: unless-stopped
    
    # GPU Configuration - NVIDIA CUDA Support
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    ports:
      - "8000:8000"    # Backend API
      - "8766:8766"    # WebSocket
      - "3000:3000"    # Web UI
    
    volumes:
      - ./data:/app/data
      - ./memory:/app/memory
      - ./logs:/app/logs
      - .asim-worktrees:/app/.asim-worktrees
      - ./models:/app/models  # Local LLM models volume
      - ./local-config.yaml:/app/local-config.yaml:ro
    
    environment:
      - ASIM_ENV=production
      - ASIM_LOG_LEVEL=INFO
      - ASIM_DB_PATH=/app/data/asim.db
      # GPU Configuration - Optimized for RTX 2060
      - CUDA_VISIBLE_DEVICES=0
      - TORCH_CUDA_ARCH_LIST="7.5"  # RTX 2060 architecture
      # Local LLM Configuration - Optimized Settings
      - LOCAL_LLM_ENABLED=true
      - LOCAL_LLM_PATH=/app/models
      - LOCAL_LLM_MODEL=gemma-4-E4B-it-IQ4_XS.gguf
      - LOCAL_LLM_DEVICE=cuda
      - LOCAL_LLM_N_GPU_LAYERS=40
      - LOCAL_LLM_N_CTX=16384
      - LOCAL_LLM_N_THREADS=8
      - LOCAL_LLM_N_BATCH=512
      - LOCAL_LLM_MAX_LENGTH=16384
      - LOCAL_LLM_TEMPERATURE=0.6
      - LOCAL_LLM_TOP_P=0.9
      - LOCAL_LLM_ENABLE_THINKING=true
      - LOCAL_LLM_FLASH_ATTN=true
      # Language Support
      - NEPALI_NLP_ENABLED=true
      - MULTI_LANGUAGE_ENABLED=true
      - SUPPORTED_LANGUAGES=ne,hi,en,es,fr,ar,zh,ja,de,pt,ru,bn,ur
    
    networks:
      - asim-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  asim-network:
    driver: bridge
