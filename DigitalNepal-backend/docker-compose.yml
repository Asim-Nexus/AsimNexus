version: '3.8'

services:
  # AsimNexus Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - ASIM_NODE_ID=asimnexus-node-1
      - ASIM_COUNTRY=NP
    restart: unless-stopped

  # AsimNexus Frontend
  frontend:
    build:
      context: ../frontend/react
      dockerfile: ../DigitalNepal-backend/Dockerfile.frontend
    ports:
      - "3000:80"
    restart: unless-stopped

  # Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: asimnexus
      POSTGRES_PASSWORD: asimnexus123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data: