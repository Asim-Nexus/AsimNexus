# ASIMNEXUS Full Stack Awakening
# =================================
# Complete Phase 3 deployment with all systems activated
# HTTP/3 + WebSockets + Sovereign UI + Unified APIs

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: asimnexus-postgres
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asimnexus2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - asimnexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d asimnexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - asimnexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ASIMNEXUS Core Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    image: asimnexus/backend:awakening
    container_name: asimnexus-backend
    environment:
      NODE_ENV: production
      ASIMNEXUS_MODE: awakening
      LOG_LEVEL: info
      REDIS_HOST: redis
      REDIS_PORT: 6379
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: asimnexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asimnexus2024
      NVIDIA_NIM_ENDPOINT: https://api.nvidia.com/v1
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-your-nvidia-api-key}
      JWT_SECRET: asimnexus-awakening-secret-2024
      AUTO_SCALE_ENABLED: "true"
      GPU_ACCELERATION: "true"
      HTTP3_ENABLED: "true"
      WEBSOCKET_ENABLED: "true"
      UNIFIED_API_ENABLED: "true"
      SOVEREIGN_UI_ENABLED: "true"
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - model_cache:/models
      - ./core:/app/core
      - ./bridge:/app/bridge
      - ./api:/app/api
    ports:
      - "8000:8000"
      - "50051:50051"  # gRPC port
    networks:
      - asimnexus-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # Sovereign UI Frontend
  frontend:
    build:
      context: ./interface/web
      dockerfile: Dockerfile
    image: asimnexus/frontend:awakening
    container_name: asimnexus-frontend
    environment:
      REACT_APP_API_URL: http://localhost:8000
      REACT_APP_WS_URL: ws://localhost:8000/ws/live
      REACT_APP_ENV: production
      REACT_APP_MODE: awakening
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/ws/live
    volumes:
      - ./interface/web/.next:/app/.next
      - ./interface/web/node_modules:/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - asimnexus-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # GPU Worker for AI Model Execution
  gpu-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: gpu-worker
    image: asimnexus/gpu-worker:awakening
    container_name: asimnexus-gpu-worker
    environment:
      NODE_ENV: production
      WORKER_TYPE: gpu
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NVIDIA_NIM_ENDPOINT: https://api.nvidia.com/v1
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-your-nvidia-api-key}
      MODEL_CACHE_DIR: /models
      GPU_MEMORY_LIMIT: 6GB
      MAX_BATCH_SIZE: 4
      RTX_2060_OPTIMIZED: "true"
    volumes:
      - model_cache:/models
      - ./logs:/app/logs
    ports:
      - "8080:8080"
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
          nvidia.com/gpu: 1
        reservations:
          cpus: '1.0'
          memory: 4G
          nvidia.com/gpu: 1
    runtime: nvidia

  # System Optimizer Agent
  system-optimizer:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: asimnexus/system-optimizer:awakening
    container_name: asimnexus-system-optimizer
    environment:
      NODE_ENV: production
      AGENT_TYPE: system_optimizer
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTO_CLEANUP_ENABLED: "true"
      AUTO_OPTIMIZATION_ENABLED: "true"
      PRIVACY_MODE: gdpr
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    privileged: true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Screen Analyst Agent
  screen-analyst:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: asimnexus/screen-analyst:awakening
    container_name: asimnexus-screen-analyst
    environment:
      NODE_ENV: production
      AGENT_TYPE: screen_analyst
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OCR_ENGINE: tesseract
      SCREEN_CAPTURE_ENABLED: "true"
      REAL_TIME_ANALYSIS: "true"
      NEPALI_OCR_ENABLED: "true"
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:ro
      - ./logs:/app/logs
      - ./data/ocr:/app/data/ocr
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # Sandbox Executor Agent
  sandbox-executor:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: asimnexus/sandbox-executor:awakening
    container_name: asimnexus-sandbox-executor
    environment:
      NODE_ENV: production
      AGENT_TYPE: sandbox_executor
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SANDBOX_LEVEL: maximum
      QUANTUM_SANDBOX_ENABLED: "true"
      AUTO_THREAT_DETECTION: "true"
    volumes:
      - ./logs:/app/logs
      - ./data/sandbox:/app/data/sandbox
      - ./temp/sandbox:/tmp/sandbox
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  # RTX Stress Adaptor
  rtx-stress-adaptor:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
    image: asimnexus/rtx-stress-adaptor:awakening
    container_name: asimnexus-rtx-stress-adaptor
    environment:
      NODE_ENV: production
      AGENT_TYPE: rtx_stress_adaptor
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GPU_MONITORING_ENABLED: "true"
      RTX_2060_DETECTED: "true"
      ADAPTIVE_PERFORMANCE: "true"
      EMERGENCY_THROTTLING: "true"
    volumes:
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - ./logs:/app/logs
    networks:
      - asimnexus-network
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
      runtime: nvidia

  # Nginx Load Balancer with HTTP/3
  nginx:
    image: nginx:alpine
    container_name: asimnexus-nginx
    volumes:
      - ./nginx/nginx-awakening.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - asimnexus-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: asimnexus-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus-awakening.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - asimnexus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: asimnexus-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: asimnexus2024
      GF_USERS_ALLOW_SIGN_UP: false
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    networks:
      - asimnexus-network
    depends_on:
      - prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Jaeger Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: asimnexus-jaeger
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: 9411
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14250:14250"
      - "14268:14268"
      - "14269:14269"
      - "14250:14250/udp"
    networks:
      - asimnexus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Elasticsearch for Logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: asimnexus-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - asimnexus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Kibana for Log Visualization
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: asimnexus-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - asimnexus-network
    depends_on:
      - elasticsearch
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  asimnexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
