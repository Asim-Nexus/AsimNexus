apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asimnexus-sector-api-hpa
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: sector-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asimnexus-sector-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
