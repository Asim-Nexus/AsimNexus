apiVersion: batch/v1
kind: CronJob
metadata:
  name: asimnexus-db-backup
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: backup
spec:
  # Daily at 03:00 UTC
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: asimnexus-backup-sa
          containers:
          - name: pg-dump
            image: postgres:15-alpine
            imagePullPolicy: IfNotPresent
            command:
            - sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              FILENAME="asimnexus-pg-${TIMESTAMP}.sql.gz"
              BACKUP_DIR="/backups/postgres"

              echo "[$(date)] Starting PostgreSQL backup..."

              # Create backup directory
              mkdir -p "${BACKUP_DIR}"

              # Dump all databases, compress inline
              PGPASSWORD="${DB_PASSWORD}" pg_dump \
                -h "${DB_HOST}" \
                -p "${DB_PORT}" \
                -U "${DB_USER}" \
                -d "${DB_NAME}" \
                --no-owner \
                --no-acl \
                --format=custom \
                --compress=9 \
                --file="${BACKUP_DIR}/${FILENAME}"

              # Verify backup integrity
              pg_restore --list "${BACKUP_DIR}/${FILENAME}" > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "[$(date)] Backup verified OK: ${FILENAME}"
                # Remove backups older than 14 days
                find "${BACKUP_DIR}" -name "asimnexus-pg-*.sql.gz" -type f -mtime +14 -delete
                echo "[$(date)] Old backups cleaned up (retention: 14 days)"
              else
                echo "[$(date)] BACKUP VERIFICATION FAILED: ${FILENAME}"
                rm -f "${BACKUP_DIR}/${FILENAME}"
                exit 1
              fi

            env:
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: asimnexus
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: db-password
            - name: DB_NAME
              value: asimnexus
            - name: PGSSLMODE
              value: prefer
            volumeMounts:
            - name: backup-storage
              mountPath: /backups

          # Sidecar: Redis backup (RDB snapshot copy)
          - name: redis-backup
            image: redis:7-alpine
            imagePullPolicy: IfNotPresent
            command:
            - sh
            - -c
            - |
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_DIR="/backups/redis"
              mkdir -p "${BACKUP_DIR}"

              echo "[$(date)] Starting Redis backup..."
              redis-cli -h redis -p 6379 SAVE
              if [ $? -eq 0 ]; then
                # Copy the RDB file to the shared volume
                cp /data/dump.rdb "${BACKUP_DIR}/asimnexus-redis-${TIMESTAMP}.rdb"
                echo "[$(date)] Redis backup saved: asimnexus-redis-${TIMESTAMP}.rdb"
                # Keep only last 7 daily RDB snapshots
                ls -t "${BACKUP_DIR}"/asimnexus-redis-*.rdb | tail -n +8 | xargs -r rm
              else
                echo "[$(date)] Redis backup FAILED"
                exit 1
              fi

            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            - name: redis-data
              mountPath: /data
              readOnly: true

          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: asimnexus-backup-pvc
              readOnly: false
          - name: redis-data
            persistentVolumeClaim:
              claimName: redis-data
              readOnly: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: asimnexus-backup-pvc
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: backup
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: asimnexus-backup-sa
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: backup
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: asimnexus-backup-role
  namespace: asimnexus
rules:
- apiGroups: [""]
  resources: ["pods", "pods/log", "secrets"]
  verbs: ["get", "list"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: asimnexus-backup-binding
  namespace: asimnexus
subjects:
- kind: ServiceAccount
  name: asimnexus-backup-sa
roleRef:
  kind: Role
  name: asimnexus-backup-role
  apiGroup: rbac.authorization.k8s.io
