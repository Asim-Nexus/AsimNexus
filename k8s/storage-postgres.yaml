apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-storage
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: postgres
spec:
  serviceName: postgres-storage
  replicas: 1
  selector:
    matchLabels:
      app: asimnexus
      tier: storage
      component: postgres
  template:
    metadata:
      labels:
        app: asimnexus
        tier: storage
        component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: "asimnexus"
            - name: POSTGRES_USER
              value: "asimnexus"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - asimnexus
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - asimnexus
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data-pvc
        - name: postgres-init
          configMap:
            name: postgres-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-storage
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: postgres
spec:
  selector:
    app: asimnexus
    tier: storage
    component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
