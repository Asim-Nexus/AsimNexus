apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: clickhouse
spec:
  serviceName: clickhouse
  replicas: 1
  selector:
    matchLabels:
      app: asimnexus
      tier: storage
      component: clickhouse
  template:
    metadata:
      labels:
        app: asimnexus
        tier: storage
        component: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.3
          ports:
            - containerPort: 8123
              name: http
              protocol: TCP
            - containerPort: 9000
              name: native
              protocol: TCP
          env:
            - name: CLICKHOUSE_DB
              value: "asimnexus"
            - name: CLICKHOUSE_USER
              value: "default"
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: clickhouse-password
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-init
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              memory: "4Gi"
              cpu: "1"
            limits:
              memory: "16Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: clickhouse-data
          persistentVolumeClaim:
            claimName: clickhouse-data-pvc
        - name: clickhouse-init
          configMap:
            name: clickhouse-init-sql
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: clickhouse
spec:
  selector:
    app: asimnexus
    tier: storage
    component: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
  type: ClusterIP
