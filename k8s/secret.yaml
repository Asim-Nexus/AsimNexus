apiVersion: v1
kind: Secret
metadata:
  name: asimnexus-secrets
  namespace: asimnexus
type: Opaque
stringData:
  # Redis connection string
  redis-url: "redis://asimnexus-redis:6379/0"
  
  # OpenAI API Key (for fallback)
  openai-api-key: "your-openai-api-key-here"
  
  # Anthropic API Key (for fallback)
  anthropic-api-key: "your-anthropic-api-key-here"
  
  # Google AI API Key (for fallback)
  google-api-key: "your-google-api-key-here"
  
  # NVIDIA NGC API Key (for Gemma 4 NIM)
  ngc-api-key: "your-ngc-api-key-here"
  
  # JWT Secret for authentication
  jwt-secret: "your-jwt-secret-key-here"
  
  # Database connection strings
  postgres-url: "postgresql://user:password@asimnexus-postgres:5432/asimnexus"
