# ASIMNEXUS Multi-Cloud Kubernetes Deployment
# ============================================
# Supports deployment to AWS EKS, GCP GKE, Azure AKS, Oracle OKE
# Includes auto-scaling, load balancing, and multi-region support

---
# AWS EKS Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-aws
  namespace: asimnexus
  labels:
    cloud: aws
    app: asimnexus
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asimnexus
      cloud: aws
  template:
    metadata:
      labels:
        app: asimnexus
        cloud: aws
    spec:
      containers:
      - name: asimnexus
        image: ghcr.io/asimnexus/asimnexus:latest
        ports:
        - containerPort: 8000
        env:
        - name: CLOUD_PROVIDER
          value: "aws"
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: cloud-config
              key: aws-region
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
# GCP GKE Deployment
apiVersion: apps/v1
