---
# Oracle OKE Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-oracle
  namespace: asimnexus
  labels:
    cloud: oracle
    app: asimnexus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asimnexus
      cloud: oracle
  template:
    metadata:
      labels:
        app: asimnexus
        cloud: oracle
    spec:
      containers:
      - name: asimnexus
        image: ghcr.io/asimnexus/asimnexus:latest
        ports:
        - containerPort: 8000
        env:
        - name: CLOUD_PROVIDER
          value: "oracle"
        - name: ORACLE_REGION
          valueFrom:
            configMapKeyRef:
              name: cloud-config
              key: oracle-region
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: asimnexus-hpa
  namespace: asimnexus
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: asimnexus-aws
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
# Multi-Region Service
apiVersion: v1
kind: Service
metadata:
  name: asimnexus-multi-cloud
  namespace: asimnexus
spec:
  selector:
    app: asimnexus
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: LoadBalancer
---
# Cloud ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-config
  namespace: asimnexus
data:
  aws-region: "us-east-1"
  gcp-region: "us-central1"
  azure-region: "eastus"
  oracle-region: "us-ashburn-1"
