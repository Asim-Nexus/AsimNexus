apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-api
  namespace: asimnexus
  labels:
    app: asimnexus-api
    version: v2.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: asimnexus-api
  template:
    metadata:
      labels:
        app: asimnexus-api
        version: v2.0
    spec:
      containers:
      - name: asimnexus-api
        image: asimnexus/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        - containerPort: 9000
          name: cloud-brain
          protocol: TCP
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: GEMMA4_ENDPOINT
          value: "http://gemma4-nim-service:8000"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: asimnexus-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: asimnexus-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: asimnexus-secrets
              key: anthropic-api-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - asimnexus-api
              topologyKey: kubernetes.io/hostname
