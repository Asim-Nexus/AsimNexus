apiVersion: apps/v1
kind: Deployment
metadata:
  name: asimnexus-sector-api
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: sector-api
    app.kubernetes.io/version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: asimnexus-sector-api
  template:
    metadata:
      labels:
        app: asimnexus-sector-api
    spec:
      containers:
      - name: sector-api
        image: asimnexus/core:latest
        ports:
        - containerPort: 8001
          name: sector-http
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: LOG_LEVEL
          value: "INFO"
        - name: ASIM_SECTOR_MODE
          value: "dedicated"
        envFrom:
        - configMapRef:
            name: asimnexus-config
        - secretRef:
            name: asimnexus-secrets
        livenessProbe:
          httpGet:
            path: /api/sectors/health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/sectors/health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: sector-api-service
  namespace: asimnexus
  labels:
    app.kubernetes.io/name: asimnexus
    app.kubernetes.io/component: sector-api
spec:
  selector:
    app: asimnexus-sector-api
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
    name: sector-http
  type: ClusterIP
