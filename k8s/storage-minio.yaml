apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: asimnexus
      tier: storage
      component: minio
  template:
    metadata:
      labels:
        app: asimnexus
        tier: storage
        component: minio
    spec:
      containers:
        - name: minio
          image: minio/minio:RELEASE.2024-11-17T01-20-39Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
              protocol: TCP
            - containerPort: 9001
              name: console
              protocol: TCP
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: minio-secret-key
          volumeMounts:
            - name: minio-data
              mountPath: /data
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "8Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data-pvc
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: minio
spec:
  selector:
    app: asimnexus
    tier: storage
    component: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
---
# MinIO bucket initialisation (one-shot Job)
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-init-buckets
  namespace: asimnexus
  labels:
    app: asimnexus
    tier: storage
    component: minio-init
spec:
  template:
    spec:
      containers:
        - name: mc
          image: minio/mc:RELEASE.2024-11-17T01-20-39Z
          command:
            - /bin/sh
            - -c
            - |
              /usr/bin/mc alias set asimnexus http://minio:9000 \
                "${MINIO_ROOT_USER}" "${MINIO_ROOT_PASSWORD}";
              for bucket in models data backups logs memory config federation artifacts; do
                /usr/bin/mc mb "asimnexus/${bucket}" --ignore-existing;
              done;
              echo "All MinIO buckets created";
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: minio-access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: asimnexus-secrets
                  key: minio-secret-key
      restartPolicy: OnFailure
  backoffLimit: 3
