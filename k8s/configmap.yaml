apiVersion: v1
kind: ConfigMap
metadata:
  name: asimnexus-config
  namespace: asimnexus
data:
  asim_brain_config.json: |
    {
      "technical_brain": {
        "model": "google-gemma4-27b",
        "provider": "nvidia-nim",
        "endpoint": "http://gemma4-nim-service:8000"
      },
      "spiritual_brain": {
        "model": "gemini-pro",
        "provider": "google"
      },
      "quantum_brain": {
        "model": "claude-3-opus",
        "provider": "anthropic"
      },
      "turboquant": {
        "enabled": true,
        "compression_ratio": 0.5
      },
      "integration_hash": "v2.0-integration",
      "deployment_time": "2025-04-09T00:00:00Z"
    }
  sector_api_config.json: |
    {
      "enabled_sectors": ["hospital", "hotel", "education", "banking"],
      "hospital": {
        "max_beds": 1000,
        "max_patients": 10000,
        "max_staff": 5000
      },
      "hotel": {
        "max_rooms": 500,
        "max_bookings": 5000
      },
      "education": {
        "max_students": 10000,
        "max_courses": 500
      },
      "banking": {
        "max_accounts": 50000,
        "max_transactions_per_account": 1000,
        "supported_currencies": ["NRS", "USD", "EUR", "INR", "GBP", "JPY"]
      },
      "constitutional_balance": {
        "government_share": 0.51,
        "private_share": 0.49,
        "personal_os_enabled": true
      }
    }
  global_agent_config.json: |
    {
      "mode": "personal_os",
      "government_share": 0.51,
      "private_share": 0.49,
      "personal_os_enabled": true,
      "global_discovery": true,
      "cross_border_sync": true,
      "mesh_routing": "auto",
      "audit_level": "full",
      "max_agents": 1000,
      "heartbeat_interval": 30
    }
  hardening_config.json: |
    {
      "security_layers": {
        "dharma_chakra": {"enabled": true, "layer": 1},
        "rbac": {"enabled": true, "layer": 2},
        "input_sanitizer": {"enabled": true, "layer": 3},
        "audit_logger": {"enabled": true, "layer": 4},
        "zero_trust": {"enabled": true, "layer": 5},
        "risk_validator": {"enabled": true, "layer": 6},
        "power_balance": {"enabled": true, "layer": 7}
      },
      "rate_limiting": {
        "enabled": true,
        "requests_per_minute": 100,
        "burst_size": 200
      }
    }
