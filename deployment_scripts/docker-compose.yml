
version: '3.8'

services:
  asimnexus:
    build: .
    ports:
      - "8080:8080"
    environment:
      - ASIMNEXUS_ENV=production
      - ASIMNEXUS_PORT=8080
    volumes:
      - ./logs:/app/logs
      - ./vault:/app/vault
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: asimnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
