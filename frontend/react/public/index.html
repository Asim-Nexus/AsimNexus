<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
    <meta name="theme-color" content="#667eea" />
    <meta name="background-color" content="#0f0f1a" />
    <meta name="description" content="ASIMNEXUS - Next-generation AI-powered operating system with autonomous agents" />
    <meta name="keywords" content="AI, automation, agents, founders, OS" />
    <meta name="author" content="ASIMNEXUS" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ASIMNEXUS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <title>ASIMNEXUS World OS</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(r => console.log('[SW] registered', r.scope))
            .catch(e => console.warn('[SW] failed', e));
        });
      }
    </script>
  </body>
</html>
