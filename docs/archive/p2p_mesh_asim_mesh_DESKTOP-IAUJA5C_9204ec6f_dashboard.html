
<!DOCTYPE html>
<html>
<head>
    <title>🌐 ASIMNEXUS P2P Data Mesh</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .dashboard { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .mesh-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .peer-card { background: #2a2a2a; padding: 20px; border-radius: 10px; border: 1px solid #3a3a3a; }
        .status-value { font-size: 1.5em; font-weight: bold; color: #00ff00; }
        .status-label { color: #aaa; margin-top: 5px; }
        .transfers { background: #2a2a2a; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .refresh-btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>🌐 ASIMNEXUS P2P Data Mesh</h1>
            <p>LocalDrop-inspired Device-to-Device Network</p>
            <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
        </div>
        
        <div class="mesh-grid">
            <div class="peer-card">
                <div class="status-value">💻 Laptop</div>
                <div class="status-label">Ubuntu 22.04 Connected</div>
            </div>
            <div class="peer-card">
                <div class="status-value">📱 Phone</div>
                <div class="status-label">Android 13 Connected</div>
            </div>
            <div class="peer-card">
                <div class="status-value">🖥️ Desktop</div>
                <div class="status-label">Windows 11 Connected</div>
            </div>
            <div class="peer-card">
                <div class="status-value">🔗 Mesh Status</div>
                <div class="status-label">3 Peers Active</div>
            </div>
        </div>
        
        <div class="transfers">
            <h2>📊 Active Transfers</h2>
            <div id="transfers-data">
                <div class="peer-card">🌐 P2P file transfers running at 1Gbps...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-refresh every 2 seconds
        setTimeout(() => location.reload(), 2000);
    </script>
</body>
</html>
