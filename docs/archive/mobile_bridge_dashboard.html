
<!DOCTYPE html>
<html>
<head>
    <title>📱 ASIMNEXUS Mobile Bridge</title>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #1a1a1a; color: #fff; }
        .dashboard { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .sensor-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .sensor-card { background: #2a2a2a; padding: 20px; border-radius: 10px; border: 1px solid #3a3a3a; }
        .status-value { font-size: 1.5em; font-weight: bold; color: #00ff00; }
        .status-label { color: #aaa; margin-top: 5px; }
        .environment { background: #2a2a2a; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .refresh-btn { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>📱 ASIMNEXUS MOBILE BRIDGE</h1>
            <p>Android Phone as Eyes and Ears</p>
            <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
        </div>
        
        <div class="sensor-grid">
            <div class="sensor-card">
                <div class="status-value">📷 Camera</div>
                <div class="status-label">Visual Input Active</div>
            </div>
            <div class="sensor-card">
                <div class="status-value">🎤 Microphone</div>
                <div class="status-label">Audio Processing Active</div>
            </div>
            <div class="sensor-card">
                <div class="status-value">📍 GPS</div>
                <div class="status-label">Location Tracking Active</div>
            </div>
            <div class="sensor-card">
                <div class="status-value">📱 Motion</div>
                <div class="status-label">Activity Detection Active</div>
            </div>
        </div>
        
        <div class="environment">
            <h2>🌍 Environment Analysis</h2>
            <div id="environment-data">
                <div class="sensor-card">📱 Mobile sensors providing real-time environmental data...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Auto-refresh every 10 seconds
        setTimeout(() => location.reload(), 10000);
    </script>
</body>
</html>
