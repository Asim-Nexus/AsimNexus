# 🐳 ASIMNEXUS Production Docker Compose
# Phase 4: Mobile & Production Optimization
# Complete production deployment with Redis, Database, Backend, and Frontend

version: '3.8'

services:
  # Redis for caching and coordination
  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes
    restart: unless-stopped
    networks:
      - asimnexus-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: asimnexus-postgres
    environment:
      POSTGRES_DB: asimnexus
      POSTGRES_USER: asimnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - asimnexus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API Server
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: asimnexus-backend
    environment:
      - DATABASE_URL=postgresql://asimnexus:${POSTGRES_PASSWORD}@postgres:5432/asimnexus
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - PYTHONPATH=/app
      - ASIM_ENV=production
      - LOG_LEVEL=INFO
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - asimnexus-network
    healthcheck:
      test: ["CMD", "curl -f http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./logs:/app/logs

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend/react
      dockerfile: Dockerfile
    container_name: asimnexus-frontend
    environment:
      - REACT_APP_SOCKET_URL=http://localhost:8765
      - REACT_APP_API_URL=http://localhost:3000
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - asimnexus-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: asimnexus-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - asimnexus-network

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  logs:
    driver: local

networks:
  asimnexus-network:
    driver: bridge
