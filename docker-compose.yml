# ASIMNEXUS — Docker Compose (Root Entry Point)
# ==============================================
# This file is the root entry point. It includes the main compose file from infra/docker/.
# All variant compose files are consolidated in infra/docker/.
#
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose -f infra/docker/docker-compose.prod.yml up -d
#   Storage:     docker compose -f infra/docker/docker-compose.storage.yml up -d
#
# For the complete and most up-to-date configuration, see:
#   infra/docker/docker-compose.yml

services:
  asimnexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asimnexus-master
    ports:
      - "8000:8000"
      - "8080:8080"
      - "3000:3000"
      - "7331:7331/udp"
      - "7332:7332/udp"
      - "7333:7333"
      - "7334:7334"
      - "7335:7335"
      - "7336:7336/udp"
    volumes:
      - ./data:/app/data
      - ./memory:/app/memory
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - ASIM_ENV=${ASIM_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - PYTHONUNBUFFERED=1
      - ASIM_JWT_SECRET=${ASIM_JWT_SECRET}
      - ASIM_ALLOWED_ORIGINS=${ASIM_ALLOWED_ORIGINS:-http://localhost:3000}
      - ASIM_DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - asimnexus-network

  redis:
    image: redis:7-alpine
    container_name: asimnexus-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - asimnexus-network
    profiles:
      - cache

  postgres:
    image: postgres:15-alpine
    container_name: asimnexus-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=asimnexus
      - POSTGRES_USER=asimnexus
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - asimnexus-network
    profiles:
      - database

volumes:
  redis-data:
    driver: local
  postgres-data:
    driver: local

networks:
  asimnexus-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
