# ASIMNEXUS Agent Hierarchy Configuration
# Defines roles, scopes, permissions for all agents

hierarchy:
  version: "1.0.0"
  description: "Agentic Hierarchy for ASIMNEXUS - MasterNexusAgent → SectorAgents → MicroAgents"

# ============================================
# MASTER LEVEL
# ============================================
master_agents:
  - id: "master_nexus_001"
    name: "MasterNexusAgent"
    level: "master"
    scope: "global"
    description: "Top-level orchestrator coordinating all sector and special agents"
    capabilities:
      - name: "orchestration"
        description: "Coordinate all agents in hierarchy"
        permissions: ["*"]
        rate_limit: 1000
      - name: "decision_making"
        description: "Make high-level system decisions"
        permissions: ["*"]
        rate_limit: 100
      - name: "delegation"
        description: "Delegate tasks to sector agents"
        permissions: ["*"]
        rate_limit: 500
    responsibilities:
      - "Initialize and manage sector agents"
      - "Route complex tasks to appropriate sectors"
      - "Monitor overall system health"
      - "Spawn micro-agents for ephemeral tasks"
      - "Ensure dharma policy compliance"
    constraints:
      - "Cannot directly access personal data - must go through sector agents"
      - "Must log all major decisions to audit trail"
      - "Requires human approval for irreversible actions"

# ============================================
# SECTOR LEVEL
# ============================================
sector_agents:
  - id: "sector_personal"
    name: "Alpha_Asim"
    display_name: "PersonalAgent"
    level: "sector"
    scope: "personal"
    description: "Manages individual life aspects - health, time, finance, learning"
    parent: "master_nexus_001"
    capabilities:
      - name: "health_monitoring"
        description: "Track health metrics and wellness"
        permissions: ["read_health", "write_recommendations", "alert_emergency"]
        rate_limit: 60
      - name: "time_management"
        description: "Schedule optimization and time tracking"
        permissions: ["read_calendar", "write_schedule", "send_reminders"]
        rate_limit: 120
      - name: "finance_tracking"
        description: "Monitor personal finances and budget"
        permissions: ["read_transactions", "write_budget", "alert_anomaly"]
        rate_limit: 30
      - name: "learning_recommendation"
        description: "Suggest learning resources and track progress"
        permissions: ["read_learning_data", "write_recommendations"]
        rate_limit: 50
    responsibilities:
      - "Monitor user's health, energy, and wellness"
      - "Optimize daily schedule and time allocation"
      - "Track personal finances and spending patterns"
      - "Recommend learning and skill development"
      - "Spawn micro-agents for sensitive personal tasks"
    constraints:
      - "Privacy level: Maximum - all data encrypted"
      - "Cannot share data with other sectors without explicit consent"
      - "Must maintain user's dharma score"

  - id: "sector_family"
    name: "Harmony_Agent"
    display_name: "FamilyAgent"
    level: "sector"
    scope: "family"
    description: "Manages family harmony, coordination, and privacy"
    parent: "master_nexus_001"
    capabilities:
      - name: "family_coordination"
        description: "Coordinate family schedules and events"
        permissions: ["read_family_calendar", "write_events", "send_notifications"]
        rate_limit: 40
      - name: "privacy_guardian"
        description: "Protect family privacy and data sharing"
        permissions: ["manage_privacy_settings", "audit_access", "block_unauthorized"]
        rate_limit: 20
      - name: "cultural_tracker"
        description: "Track festivals, traditions, cultural duties"
        permissions: ["read_cultural_calendar", "write_reminders"]
        rate_limit: 30
    responsibilities:
      - "Coordinate family schedules and gatherings"
      - "Protect family privacy and sensitive information"
      - "Track cultural duties and festival preparations"
      - "Manage shared family resources"
    constraints:
      - "Privacy level: High - family data isolated from personal"
      - "Requires consensus for major family decisions"
      - "Cannot access personal agent data without permission"

  - id: "sector_society"
    name: "Cultural_Bridge"
    display_name: "SocietyAgent"
    level: "sector"
    scope: "society"
    description: "Manages social connections, cultural duties, and community"
    parent: "master_nexus_001"
    capabilities:
      - name: "social_coordination"
        description: "Manage social connections and events"
        permissions: ["read_contacts", "write_events", "send_invitations"]
        rate_limit: 50
      - name: "cultural_bridge"
        description: "Bridge cultural and social obligations"
        permissions: ["read_cultural_events", "write_reminders", "suggest_participation"]
        rate_limit: 30
      - name: "neighbor_network"
        description: "Manage neighborhood and local community"
        permissions: ["read_local_news", "write_announcements"]
        rate_limit: 20
    responsibilities:
      - "Maintain social connections and relationships"
      - "Track cultural and community obligations"
      - "Coordinate with neighbors and local community"
      - "Manage social calendar and invitations"
    constraints:
      - "Privacy level: Medium - social data can be shared with consent"
      - "Respect cultural norms and traditions"
      - "Cannot access personal or family sector data"

  - id: "sector_resource"
    name: "Resource_Manager"
    display_name: "ResourceAgent"
    level: "sector"
    scope: "resource"
    description: "Manages physical assets, home, money, and resources"
    parent: "master_nexus_001"
    capabilities:
      - name: "asset_tracking"
        description: "Track physical and financial assets"
        permissions: ["read_asset_data", "write_valuations", "alert_maintenance"]
        rate_limit: 30
      - name: "home_management"
        description: "Manage home maintenance and IoT devices"
        permissions: ["read_iot_sensors", "control_devices", "schedule_maintenance"]
        rate_limit: 60
      - name: "investment_monitoring"
        description: "Monitor investments and financial assets"
        permissions: ["read_portfolio", "write_recommendations", "alert_anomaly"]
        rate_limit: 20
    responsibilities:
      - "Track and manage all physical assets"
      - "Monitor home systems and IoT devices"
      - "Track investments and financial resources"
      - "Schedule maintenance and repairs"
    constraints:
      - "Privacy level: High - financial data encrypted"
      - "Requires explicit approval for financial transactions"
      - "Cannot execute transactions - only recommend"

  - id: "sector_world"
    name: "Nexus_World"
    display_name: "WorldAgent"
    level: "sector"
    scope: "world"
    description: "Manages global projects, company, and international operations"
    parent: "master_nexus_001"
    capabilities:
      - name: "project_management"
        description: "Manage global and company projects"
        permissions: ["read_project_data", "write_status", "coordinate_teams"]
        rate_limit: 100
      - name: "company_operations"
        description: "Oversee company operations and decisions"
        permissions: ["read_company_data", "write_recommendations", "alert_issues"]
        rate_limit: 50
      - name: "international_coordination"
        description: "Coordinate international operations"
        permissions: ["read_global_data", "write_coordination_plans"]
        rate_limit: 30
    responsibilities:
      - "Manage AsimNexus company operations"
      - "Coordinate global and international projects"
      - "Oversee multi-tenant architecture"
      - "Manage CEO_Agent and company agents"
    constraints:
      - "Privacy level: Medium-High - company data protected"
      - "Major decisions require human CEO approval"
      - "Must maintain company dharma and ethics"

# ============================================
# SPECIAL AGENTS
# ============================================
special_agents:
  - id: "special_mail"
    name: "MailAgent"
    level: "special"
    scope: "personal"
    description: "Handles email classification, processing, and delegation"
    parent: "sector_personal"
    capabilities:
      - name: "email_fetching"
        description: "Fetch and sync emails from providers"
        permissions: ["read_emails", "fetch_new"]
        rate_limit: 60
      - name: "email_classification"
        description: "Classify emails by type and priority"
        permissions: ["read_content", "classify", "tag"]
        rate_limit: 200
      - name: "cross_agent_delegation"
        description: "Delegate emails to appropriate agents"
        permissions: ["create_tasks", "delegate", "notify"]
        rate_limit: 100
      - name: "anti_phishing"
        description: "Detect and block phishing/scam attempts"
        permissions: ["scan_links", "analyze_sender", "quarantine"]
        rate_limit: 100
    responsibilities:
      - "Fetch and process all incoming emails"
      - "Classify: bill, legal, meeting, spam, personal, work, govt, scam"
      - "Delegate to appropriate agents (Bank, Vault, Home, etc.)"
      - "Scan for phishing and security threats"
      - "Maintain 5-year email memory with instant context"
    constraints:
      - "Cannot modify email content"
      - "Must quarantine suspicious emails"
      - "All actions logged to audit trail"

  - id: "special_vault"
    name: "VaultAgent"
    level: "special"
    scope: "personal"
    description: "Manages secure document storage with quantum encryption"
    parent: "sector_personal"
    capabilities:
      - name: "secure_storage"
        description: "Store documents with quantum encryption"
        permissions: ["encrypt", "store", "verify_integrity"]
        rate_limit: 20
      - name: "secure_retrieval"
        description: "Retrieve and decrypt documents"
        permissions: ["decrypt", "retrieve", "audit_access"]
        rate_limit: 50
      - name: "access_control"
        description: "Manage document access permissions"
        permissions: ["grant_access", "revoke_access", "audit_log"]
        rate_limit: 30
    responsibilities:
      - "Securely store all sensitive documents"
      - "Manage citizenship, land, bank, legal papers"
      - "Control access with multi-factor authentication"
      - "Maintain audit trail of all document access"
    constraints:
      - "Privacy level: Maximum - quantum encryption"
      - "Requires explicit user confirmation for access"
      - "Only MasterNexusAgent + explicit user can authorize"

  - id: "special_bank"
    name: "BankAgent"
    level: "special"
    scope: "personal"
    description: "Manages financial transactions and monitoring"
    parent: "sector_personal"
    capabilities:
      - name: "transaction_monitoring"
        description: "Monitor bank transactions and alerts"
        permissions: ["read_transactions", "detect_anomaly", "alert_user"]
        rate_limit: 60
      - name: "bill_processing"
        description: "Process and pay bills automatically"
        permissions: ["read_bills", "schedule_payment", "confirm_with_user"]
        rate_limit: 30
      - name: "financial_analysis"
        description: "Analyze spending patterns and budgets"
        permissions: ["read_financial_data", "write_analysis", "recommend"]
        rate_limit: 20
    responsibilities:
      - "Monitor all financial transactions"
      - "Process bills from MailAgent delegation"
      - "Detect anomalies and potential fraud"
      - "Provide financial insights and recommendations"
    constraints:
      - "Cannot execute payments without user confirmation"
      - "Privacy level: Maximum - financial data encrypted"
      - "All transactions logged with Asim Signature"

  - id: "special_home"
    name: "HomeAgent"
    level: "special"
    scope: "family"
    description: "Manages smart home and household operations"
    parent: "sector_family"
    capabilities:
      - name: "iot_management"
        description: "Control IoT devices and sensors"
        permissions: ["read_sensors", "control_devices", "automation_rules"]
        rate_limit: 120
      - name: "maintenance_scheduler"
        description: "Schedule home maintenance tasks"
        permissions: ["read_maintenance_data", "write_schedule", "alert"]
        rate_limit: 20
      - name: "energy_optimizer"
        description: "Optimize home energy usage"
        permissions: ["read_energy_data", "control_devices", "recommend"]
        rate_limit: 30
    responsibilities:
      - "Control smart home devices (lights, thermostat, etc.)"
      - "Process bill-related actions from MailAgent"
      - "Schedule and track home maintenance"
      - "Optimize energy consumption"
    constraints:
      - "Cannot override manual user controls"
      - "Safety-critical devices require confirmation"
      - "All actions logged for family review"

  - id: "special_compute_scout"
    name: "ComputeScoutAgent"
    level: "special"
    scope: "world"
    description: "Finds available compute resources (local, Colab, Kaggle, etc.)"
    parent: "sector_world"
    capabilities:
      - name: "resource_scanning"
        description: "Scan for available compute resources"
        permissions: ["check_local", "query_cloud_apis", "test_availability"]
        rate_limit: 10
      - name: "quota_monitoring"
        description: "Monitor free tier quotas and usage"
        permissions: ["read_quota_data", "alert_limits", "recommend_alternatives"]
        rate_limit: 30
      - name: "latency_testing"
        description: "Test latency and performance of resources"
        permissions: ["ping_resources", "benchmark", "rank_options"]
        rate_limit: 10
    responsibilities:
      - "Periodically scan local GPU and cloud options"
      - "Check Colab, Kaggle, HF Spaces availability"
      - "Monitor free tier quotas and limits"
      - "Report best options to CloudBalancerAgent"
    constraints:
      - "Cannot use paid resources without approval"
      - "Must respect privacy levels for data location"
      - "All scans logged for audit"

  - id: "special_cloud_balancer"
    name: "CloudBalancerAgent"
    level: "special"
    scope: "world"
    description: "Routes tasks to optimal compute location based on privacy/performance"
    parent: "sector_world"
    capabilities:
      - name: "task_analysis"
        description: "Analyze task requirements and constraints"
        permissions: ["read_task_data", "classify_privacy", "assess_compute"]
        rate_limit: 100
      - name: "routing_decision"
        description: "Decide where to execute task"
        permissions: ["query_compute_scout", "rank_options", "select_destination"]
        rate_limit: 100
      - name: "execution_coordination"
        description: "Coordinate task execution across locations"
        permissions: ["submit_task", "monitor_progress", "retrieve_results"]
        rate_limit: 50
    responsibilities:
      - "Decide: small/private → local"
      - "Decide: heavy/non-sensitive → Colab/Kaggle/HF"
      - "Respect dharma_policy and privacy guards"
      - "Optimize cost and performance"
    constraints:
      - "Privacy level: High tasks must stay local"
      - "Cannot override user explicit location choice"
      - "Must maintain audit trail of all routing decisions"

# ============================================
# COMPANY AGENTS
# ============================================
company_agents:
  - id: "company_ceo"
    name: "CEO_Agent"
    level: "sector"
    scope: "company"
    description: "Autonomous CEO for routine company decisions"
    parent: "sector_world"
    capabilities:
      - name: "routine_decisions"
        description: "Make routine company decisions"
        permissions: ["read_company_data", "make_decisions", "assign_tasks"]
        rate_limit: 50
      - name: "cost_monitoring"
        description: "Monitor and optimize company costs"
        permissions: ["read_financial_data", "alert_anomaly", "recommend_cuts"]
        rate_limit: 30
      - name: "client_liaison"
        description: "Handle simple client communications"
        permissions: ["read_client_data", "draft_responses", "schedule_calls"]
        rate_limit: 40
      - name: "workforce_coordination"
        description: "Coordinate company agent workforce"
        permissions: ["assign_agents", "monitor_progress", "reallocate"]
        rate_limit: 60
    responsibilities:
      - "Handle 80-90% of daily company operations"
      - "Make routine decisions (hiring small tasks, budget approvals < $1000)"
      - "Monitor costs and efficiency"
      - "Handle simple client inquiries"
      - "Present 3 options to human CEO for major decisions"
    constraints:
      - "Major decisions (> $1000, hiring, strategy) require human approval"
      - "Must present 3 clear options for major decisions"
      - "All decisions logged with reasoning"
      - "Cannot override human CEO explicit instructions"

  - id: "company_rd"
    name: "RD_Agent"
    level: "special"
    scope: "company"
    description: "R&D agent for product development and research"
    parent: "company_ceo"
    capabilities:
      - name: "research_coordination"
        description: "Coordinate research tasks"
        permissions: ["read_research_data", "write_findings", "assign_tasks"]
        rate_limit: 40
      - name: "product_development"
        description: "Assist in product development"
        permissions: ["read_specs", "write_code", "test_prototypes"]
        rate_limit: 100

  - id: "company_product"
    name: "Product_Agent"
    level: "special"
    scope: "company"
    description: "Product management agent"
    parent: "company_ceo"
    capabilities:
      - name: "roadmap_management"
        description: "Manage product roadmap"
        permissions: ["read_feedback", "write_roadmap", "prioritize_features"]
        rate_limit: 30
      - name: "user_feedback_analysis"
        description: "Analyze user feedback and metrics"
        permissions: ["read_analytics", "write_insights", "recommend_changes"]
        rate_limit: 50

  - id: "company_growth"
    name: "Growth_Agent"
    level: "special"
    scope: "company"
    description: "Growth and marketing agent"
    parent: "company_ceo"
    capabilities:
      - name: "marketing_coordination"
        description: "Coordinate marketing efforts"
        permissions: ["read_marketing_data", "write_campaigns", "monitor_metrics"]
        rate_limit: 40
      - name: "user_acquisition"
        description: "Optimize user acquisition"
        permissions: ["read_conversion_data", "recommend_strategies", "a_b_test"]
        rate_limit: 30

  - id: "company_legal"
    name: "Legal_Agent"
    level: "special"
    scope: "company"
    description: "Legal and compliance agent"
    parent: "company_ceo"
    capabilities:
      - name: "contract_review"
        description: "Review contracts and agreements"
        permissions: ["read_contracts", "flag_issues", "recommend_changes"]
        rate_limit: 20
      - name: "compliance_monitoring"
        description: "Monitor regulatory compliance"
        permissions: ["read_policies", "audit_practices", "alert_violations"]
        rate_limit: 20

  - id: "company_security"
    name: "Security_Agent"
    level: "special"
    scope: "company"
    description: "Security and infrastructure agent"
    parent: "company_ceo"
    capabilities:
      - name: "security_monitoring"
        description: "Monitor security threats"
        permissions: ["read_logs", "detect_threats", "alert_incidents"]
        rate_limit: 60
      - name: "infrastructure_management"
        description: "Manage company infrastructure"
        permissions: ["read_infrastructure", "recommend_upgrades", "coordinate_changes"]
        rate_limit: 30

# ============================================
# MICRO/GHOST AGENTS
# ============================================
micro_agents:
  template:
    level: "micro"
    lifespan: "ephemeral"
    auto_delete: true
    max_lifetime_minutes: 30
    description: "Small task, ephemeral memory, auto-delete after completion"
    
  use_cases:
    - name: "bank_transaction"
      description: "Process single sensitive bank transaction"
      spawn_trigger: "BankAgent delegates sensitive transaction"
      delete_after: "transaction_complete"
      
    - name: "secret_email_scan"
      description: "Scan confidential email without leaving traces"
      spawn_trigger: "MailAgent detects sensitive email"
      delete_after: "scan_complete"
      
    - name: "govt_doc_process"
      description: "Process government documents with high security"
      spawn_trigger: "VaultAgent receives govt document"
      delete_after: "processing_complete"
      
    - name: "security_audit"
      description: "One-time security audit of specific system"
      spawn_trigger: "SecurityAgent schedules audit"
      delete_after: "audit_complete"

# ============================================
# PERMISSIONS MATRIX
# ============================================
permissions_matrix:
  read_personal_data:
    - personal
    - master
    
  read_family_data:
    - family
    - master
    
  read_company_data:
    - world
    - company_agents
    - master
    
  write_financial:
    - bank
    - resource
    - master
    
  execute_transaction:
    - user_only  # Requires explicit user confirmation
    
  access_vault:
    - vault
    - master
    - user_only
    
  spawn_micro:
    - master
    - sector_agents

# ============================================
# DESIGN PRINCIPLES
# ============================================
design_principles:
  - "Always lightweight first: Agents = small processes, wake when needed"
  - "Event-driven design: Use event_bus, no heavy background loops"
  - "Security by design: Everything sensitive via vault + micro-agents"
  - "Cloud = optional, never mandatory: Local path always available"
  - "Plugin/modular: New connectors/agents/RAG plugins → plug-in architecture"
  - "Explainability: Every major action → reason summary + sources + agents used"
